      filtered cool-to-warm directional daylight raking from camera-left,
      restrained art alignment on side walls, no people, no captions.
    constraints:
      - preserve pale stone palette
      - preserve filtered cool-to-warm daylight register
      - preserve threshold alignment and corridor depth
      - no people
      - no redesign of architectural geometry
