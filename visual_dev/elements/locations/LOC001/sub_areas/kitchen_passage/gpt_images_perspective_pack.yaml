      aspect_ratio: "16:9"
  - prompt_id: GPTIMG2_LOC001_KITCHEN_PASSAGE_P04_REAR_OR_SIDE_V001
    perspective: rear_or_side
    prompt_text: >
      Use the registered LOC001 kitchen passage hero lock as identity anchor.
      Generate one reverse-angle view looking back down the corridor from a
      vantage past the leading-edge threshold; preserve pale stone palette,
      filtered cool-to-warm directional daylight (now backlighting the camera
