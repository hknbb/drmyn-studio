      filtered cool-to-warm directional daylight, and art alignment intervals;
      no people, no captions.
    constraints:
      - preserve pale stone palette
      - preserve filtered cool-to-warm daylight register
      - preserve threshold alignment continuity
      - no people
      - no redesign of architectural geometry
    expected_output:
      asset_type: still
      aspect_ratio: "16:9"
  - prompt_id: GPTIMG2_LOC001_KITCHEN_PASSAGE_P03_THREE_QUARTER_RIGHT_V001
    perspective: three_quarter_right
    prompt_text: >
      Use the registered LOC001 kitchen passage hero lock as identity anchor.
      Generate one three-quarter view rotated to the right of the corridor
