  Vale Residence kitchen passage, Vardova, early morning. A wide corridor of
  pale stone surfaces with multiple thresholds receding in depth; one prominent
  framed doorway right-of-center, additional thresholds visible through
  successive sightlines. Filtered cool-to-warm directional daylight rakes
  across pale stone walls from a window beyond frame; geometric shadow patterns
  fall on the polished stone floor. Restrained domestic neutrals: warm gray,
  bone, low-saturation taupe, pale stone gold. Framed corporate art aligned on
  walls in deliberate intervals; one third frame is implied off-center for
  later prop integration but is not the focus of this hero. Surveillance-aware
  geometry: the corridor reads as orderly, expensive, contained, lightly
  underused. No people. No subtitles, no logos, no watermark. Aspect ratio 16:9.
