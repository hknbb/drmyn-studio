target_role: multi_perspective_element_expander
element_id: C07
element_type: character
perspective_policy: four_view_scale_angle_v3
full_body_visible: true
shared_preservation_instruction: >
  Use TWO references: take face geometry, pose, framing, even neutral lighting
  and expression from the PRIMARY reference (Stage-2 lock); take only skin
  warmth and hair texture from the SECONDARY reference (Stage-1 hero). Do not
  copy the Stage-1 directional light, angle, or background.
  Preserve the locked Sera identity exactly across all four views — same
  forward-moving institutional intelligence: blonde/ash hair pulled back,
  upright contained posture, alert direct gaze, the weight of someone who has
  lost something and kept going. Dark professional blazer over dark top, dark
  neutral trousers; no fashion-forward elements, no glamour, no anchor-studio
  styling. Calm, controlled expression with private determination underneath.
  Natural restrained realism; not cold, not theatrical, not editorial;
  neutral clean background; no text, no watermark.
source_refs:
  scene_card_ref: planning/scenes/SC0040/scene_card.yaml
  element_sheet_ref: visual_dev/elements/characters/C07/look_variants/C07_LOOK_NEWSROOM_V001.yaml
prompts:
  - prompt_id: PPACK_C07_NEWSROOM_V001__full_body_front
    perspective: full_body_front
    prompt_text: >
      Full-body front view, head to feet in frame, of the locked reference
      woman in her newsroom look: dark professional blazer over dark top,
      dark neutral trousers. Standing upright with contained posture, hands
      loosely at sides or in pockets, even soft light, neutral clean
      background. Preserve identity and wardrobe exactly; restrained realism,
      no redesign, no text, no watermark.
    constraints:
      - "Head-to-toe, no cropping of feet or head."
      - "Same identity + newsroom wardrobe as the locked reference."
      - "Neutral background; no scene set dressing."
    expected_output:
      asset_type: still
      aspect_ratio: "2:3"
  - prompt_id: PPACK_C07_NEWSROOM_V001__three_quarter_waist
    perspective: three_quarter_waist
    prompt_text: >
      Three-quarter angle, waist-up framing, of the same locked reference
      woman in the identical newsroom wardrobe. Body turned ~30-45 degrees,
      head toward camera, alert direct gaze. Even soft light, neutral clean
      background. Preserve identity and garments exactly; restrained realism,
      no redesign, no text, no watermark.
    constraints:
      - "Waist-up scale; three-quarter body angle."
      - "Identity + wardrobe identical to full_body_front."
      - "Neutral background."
    expected_output:
      asset_type: still
      aspect_ratio: "3:4"
  - prompt_id: PPACK_C07_NEWSROOM_V001__close_portrait_front
    perspective: close_portrait_front
    prompt_text: >
      Close front portrait, chest-up, of the same locked reference woman —
      full frontal face for identity lock. Blonde/ash hair pulled back;
      alert direct gaze with forward-moving intelligence; controlled
      expression with private determination underneath; real institutional
      weight without performance. Dark blazer visible at chest. Even soft
      light, neutral clean background. Preserve identity exactly; not cold,
      not editorial, no glamour, no redesign, no text, no watermark.
    constraints:
      - "Chest/shoulders/head; fully frontal face."
      - "Maximum face-geometry fidelity to the locked reference."
      - "Neutral background."
    expected_output:
      asset_type: still
      aspect_ratio: "3:4"
  - prompt_id: PPACK_C07_NEWSROOM_V001__profile_full
    perspective: profile_full
    prompt_text: >
      Side profile view of the same locked reference woman in the identical
      newsroom wardrobe, for a 3D identity wrap. Clean lateral profile, even
      soft light, neutral clean background. Preserve identity and garments
      exactly; restrained realism, no redesign, no text, no watermark.
    constraints:
      - "True side profile (90 degrees)."
      - "Identity + wardrobe identical to the other three views."
      - "Neutral background."
    expected_output:
      asset_type: still
      aspect_ratio: "3:4"
qc_gate:
  minimum_score: 85
  all_perspectives_required: true
  failed_perspective_revision_only: true
downstream_use:
