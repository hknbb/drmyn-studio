source_reference_id: >
  DUAL SEED.
  PRIMARY (geometry/pose/lighting/expression) = Stage-2 --oref lock
  (archive/closing_price/_elements/C07/stage2/images/u9435212546_Woman_mid_30s_to_mid_40s_senior_investigative_jou_9fcba347-0027-42b2-8b2c-a17dc9c66776_3.png).
  SECONDARY (skin tone, warmth, hair texture only) = Stage-1 hero
  (archive/closing_price/_elements/C07/stage1/images/u9435212546_Woman_mid_30s_to_mid_40s_senior_investigative_jou_2c0bb89d-e782-4db2-8a49-1d9846c418dd_1.png).
  Take pose/framing/neutral light/expression from PRIMARY; take only skin
