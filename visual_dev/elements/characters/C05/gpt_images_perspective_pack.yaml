    prompt_text: Use the uploaded refined character reference as the strict identity source. Generate one front-facing production reference image of the same character, front view, full identity read. Preserve face geometry, age read, hair silhouette, body presence, wardrobe-world, and expression/performance identity. Change only camera angle and framing scale. No left/right or profile instruction. No props, no furniture, no extra people, no text, no watermark, no logo.
