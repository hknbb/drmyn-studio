      full frontal face for identity lock. Dark slicked-back hair; angular
      jaw; controlled watchful expression with warmth under restraint; real
      weight in stillness, not a thriller cutout. Plain dark shirt visible
      at chest. Even soft light, neutral clean background. Preserve identity
      exactly; not cold, not hard-edged, no glamour, no redesign, no text,
      no watermark.
    constraints:
      - "Chest/shoulders/head; fully frontal face."
      - "Maximum face-geometry fidelity to the locked reference."
      - "Neutral background."
    expected_output:
      asset_type: still
      aspect_ratio: "3:4"
  - prompt_id: PPACK_C05_PRIVATE_MEETING_V001__profile_full
    perspective: profile_full
    prompt_text: >
      Side profile view of the same locked reference man in the identical
