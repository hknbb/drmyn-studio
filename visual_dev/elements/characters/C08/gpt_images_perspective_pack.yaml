    constraints:
      - preserve ordinary infant identity
      - safe support context required
      - no distress or unsafe handling
      - no themed or narrative-coded wardrobe
      - no idealization or glow stylization
      - change only camera angle and framing scale
    expected_output:
      asset_type: still
      aspect_ratio: "2:3"
