      wardrobe, for a 3D identity wrap. Clean lateral profile, even soft light, neutral
      clean background. Preserve identity and garments exactly; restrained realism, no
      redesign, no text, no watermark.
    constraints:
      - "True side profile (90 degrees)."
      - "Identity + wardrobe identical to the other three views."
      - "Neutral background."
    expected_output:
