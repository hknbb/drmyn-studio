notes: >
  Phase 3 reference chain per revised_character_batch_to_golden_scene_plan.md
  (PR-HALO-2). First reference winner registered 2026-05-17: matte beige/grey
  composite shell, sensor array head segment (no humanoid face), utility-grade
  joint articulation, upright human-scale stance, clean neutral studio
  background. First reference was produced via Midjourney (not GPT Images 2);
  the gpt_images_2_direct identity pipeline still applies for the Stage 3
  perspective pack — the MJ first reference will be uploaded to ChatGPT Image
  as the strict identity source for the three-view FRONT / TQM / TQC pack.
  Other candidates eliminated for glossy porcelain / bronze chrome / luxury
  showroom drift and one candidate had embedded TV reference color bars
  (text/watermark violation). This reference_chain.yaml is YAML data only
  (no JSON schema registered for system_character_reference_chain — same
  convention as the existing character_reference_chain). Validator
  registration is scoped to identity_plan.yaml (system_character_element)
  to keep the additive schema surface minimal.
