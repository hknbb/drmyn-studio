physical_anchors:
  - near-future service-robot chassis with contained engineered silhouette
  - sensor array head segment that turns toward addressee as attention substitute
  - matte composite shell in muted institutional neutrals (no chrome flash)
  - upright human-scale stance without overt humanoid face
  - utility-grade joint articulation with no decorative ornament
  - persistent broadcast presence cue (subtle status indicator, not screen)
behavior_anchors:
  - sensor array turn-toward as direct-address cue
  - voice pitch slight brightening during high broadcast engagement
  - measured procedural movement, never frantic, never theatrically slow
  - addresses Nadia and other targets in warm companion tone hiding control
do_not_invent:
  - cute robot aesthetic
  - humanoid face unless source later demands it
  - chrome or glossy-luxury body finish
  - sci-fi fantasy ornamentation (glowing seams, hologram halos)
  - weaponized or visibly armed body configuration
  - casino spectacle or entertainment-stage excess
  - distress-exploitation framing of HALO presence around Jin
