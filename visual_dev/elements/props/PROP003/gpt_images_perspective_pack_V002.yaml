schema_version: "0.x-draft"
record_type: gpt_images_perspective_pack
prompt_pack_id: GPTIMG2_PROP003_PERSPECTIVE_PACK_V002
status: review
source_reference_id: external://local_manual/drmyn-studio-images/Vardova Frame/ChatGPT Image 18 May 2026 16_53_56.png
target_model: gpt_images_2
target_role: multi_perspective_element_expander
element_id: PROP003
element_type: prop
perspective_policy: three_view_no_rear
full_body_visible: false
source_refs:
  model_guidance_snapshot_ref: evidence/model_guidance_snapshots/20260504T113000Z_chatgpt_image.yaml
shared_preservation_instruction: >
  Preserve exact prop identity: frame tilt angle off horizontal, dark aged
  frame material, glass surface with faint ambient reflection, city skyline
  photograph visible through glass, thin dust shadow behind upper frame edge
  on pale stone wall. Change only camera angle and distance.
prompts:
  - prompt_id: GPTIMG2_PROP003_P01_FRONT_V002
    perspective: front_reference
    prompt_text: >
      Use the uploaded framed photograph as the strict prop identity source.
      Generate a single production still of the same frame mounted on a pale
      stone wall. Camera directly facing the frame, centered. Preserve: frame
      tilt angle, dark frame material and finish, glass surface with faint
      ambient reflection, city skyline photograph visible through glass, pale
      stone wall, thin dust shadow behind upper frame edge. Early morning cool
      filtered light. No people, no furniture. No text, no watermark, no logo.
      16:9.
    constraints:
      - preserve frame tilt angle
      - preserve dark frame material
      - preserve dust shadow behind upper edge
      - preserve glass reflection
      - preserve skyline photograph identity through glass
      - no people
    expected_output:
      asset_type: still
      aspect_ratio: "16:9"
  - prompt_id: GPTIMG2_PROP003_P02_ANGLE_V002
    perspective: left_reference
    prompt_text: >
      Use the uploaded framed photograph as the strict prop identity source.
      Generate a single production still of the same frame on the pale stone
      wall. Camera positioned at approximately 45 degrees to the left of the
      frame. Preserve: frame depth and thickness visible from the side angle,
      tilt reads as forward lean at top, glass edge visible, dust shadow behind
      upper edge, dark frame material, pale stone wall continuing. Same cool
      morning light. No people. No text, no watermark, no logo. 16:9.
    constraints:
      - preserve frame tilt and depth from angle
      - preserve dust shadow behind upper edge
      - preserve glass edge
      - no people
    expected_output:
      asset_type: still
      aspect_ratio: "16:9"
  - prompt_id: GPTIMG2_PROP003_P03_CLOSE_V002
    perspective: right_reference
    prompt_text: >
      Use the uploaded framed photograph as the strict prop identity source.
      Generate a single close production still of the same frame. Camera tight
      on the frame — frame fills most of the shot. Emphasis on: glass surface
      faint reflection, dust-shadow gap behind upper frame edge, dark worn
      frame material texture, city skyline photograph faintly visible through
      glass. Pale stone wall texture at edges. Cool morning light. No people.
      No text, no watermark, no logo. 16:9.
    constraints:
      - preserve glass surface reflection quality
      - preserve dust shadow detail
      - preserve dark frame material texture
      - preserve skyline photograph through glass
      - no people
    expected_output:
      asset_type: still
      aspect_ratio: "16:9"
qc_gate:
  minimum_score: 85
  all_perspectives_required: true
  failed_perspective_revision_only: true
downstream_use:
  - kling_omni_3_shot_prompt
