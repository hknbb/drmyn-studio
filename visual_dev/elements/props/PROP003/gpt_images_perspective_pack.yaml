    perspective: front_reference
    prompt_text: Using the uploaded reference image as the prop identity source, generate a SINGLE production still of the same Vardova skyline photo frame. Straight-on view, frame centered on pale stone wall. Frame tilted subtly off-angle, dust-shadow mismatch visible behind frame, glass reflection present, skyline photograph image legible through glass. Early morning cool filtered light, muted pale stone wall palette. No people, no furniture, no additional objects. Photorealistic, cinematic still, clean production reference photography. No text, no watermark, no logo.
    constraints:
      - preserve frame tilt angle
      - preserve dust-shadow mismatch
      - preserve pale stone wall
      - no people
    expected_output:
      asset_type: still
      aspect_ratio: "4:3"
  - prompt_id: GPTIMG2_PROP003_P02_LEFT_V001
    perspective: left_reference
    prompt_text: Using the uploaded reference image as the prop identity source, generate a SINGLE production still of the same Vardova skyline photo frame. Camera positioned to the left side of the frame. Preserve the off-angle hanging, dust-shadow mismatch behind frame, glass edge thickness, frame material and finish, pale stone wall texture, early morning filtered light. Skyline photograph partially visible through glass. No people, no furniture, no additional objects. Photorealistic, cinematic still, clean production reference photography. No text, no watermark, no logo.
    constraints:
      - preserve frame tilt angle
      - preserve dust-shadow mismatch
      - preserve glass and frame material
      - no people
    expected_output:
      asset_type: still
      aspect_ratio: "4:3"
  - prompt_id: GPTIMG2_PROP003_P03_RIGHT_V001
    perspective: right_reference
    prompt_text: Using the uploaded reference image as the prop identity source, generate a SINGLE production still of the same Vardova skyline photo frame. Camera positioned to the right side of the frame. Preserve the off-angle hanging, dust-shadow mismatch, visible glass reflection, frame depth and edge, pale stone wall texture, early morning filtered light. Skyline photograph identity preserved. No people, no furniture, no additional objects. Photorealistic, cinematic still, clean production reference photography. No text, no watermark, no logo.
    constraints:
      - preserve frame tilt angle
      - preserve dust-shadow mismatch
      - preserve glass reflection
      - no people
    expected_output:
      asset_type: still
      aspect_ratio: "4:3"
