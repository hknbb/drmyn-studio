prompting_rules:
  - "V8.1 has 74-token hard cap (tokenizer-based). Target 40-50 meaningful words. First 40 words get strongest attention."
  - "Structure: Subject → Scene → Style → Details → Parameters. Lead with primary subject. Use specific material/camera terms instead of generic quality descriptors."
  - "V8.1 prefers natural language sentences over comma-clause pattern. Literal executor: what you write is what you get."
  - "Negative constraints use --no flag at end of prompt. Example: '... --no text overlays, motion blur, lens flare'."
  - "V7: --oref (Omni Reference) with --ow <1-1000> for character/object consistency. V8.1: --oref NOT available yet (on roadmap)."
  - "Always specify aspect ratio: --ar 16:9 (cinematic), --ar 2:3 (portrait). Specify for production."
  - "Always specify version: --v 7, --v 8, or --v 8.1. Do not rely on default."
  - "Use --seed <integer> to enable reproducibility across variants. Same seed + same prompt = similar results."
  - "V8.1: Add --style raw to all character/commercial work. Strips aesthetic bias for photorealistic/controlled output."
  - "Never include canonical IDs (C01, LOC001, PROP003, SC0001) or full character names. Use first-name only."
