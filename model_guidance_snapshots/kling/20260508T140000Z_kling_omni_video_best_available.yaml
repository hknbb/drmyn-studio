prompting_rules:
  - "Write prompts as cinematic shot directions, NOT visual inventories. Focus on shot composition, camera movement, and narrative flow."
  - "Text-to-video: 30–60 words optimal. Hard maximum: 100 words. Exceeding causes 99% completion hang."
  - "Image-to-video: 15–40 words; describe motion ONLY, never redescribe visuals already in source image."
  - "For multi-shot: label each shot explicitly: 'Shot 1: ... Shot 2: ...' Up to 6 shots per generation."
  - "Use professional cinematography terms: dolly, pan, tilt, zoom, crane, tracking, orbital. NOT 'move forward' — use 'dolly forward'."
  - "Specify motion intensity on 0.1–1.0 scale: 0.1–0.3 (subtle), 0.4–0.6 (natural), 0.7–1.0 (dynamic)."
  - "Always specify end state to prevent 99% hang bug. WRONG: 'dolly forward through crowd'. RIGHT: 'dolly forward through crowd, then settles back'."
  - "Define subjects with unique visual identifiers. Example: 'Nadia, lean upright posture, muted grey linen'."
  - "Negative prompt supported (max 2500 chars). Write terms directly WITHOUT 'no' prefix — write 'blur' not 'no blur'."
  - "Never include canonical IDs (C01, LOC001, SC0001) or full character names in prompt. Use first-name only."
