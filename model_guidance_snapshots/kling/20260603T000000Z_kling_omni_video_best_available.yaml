prompting_rules:
  # ── Multi-shot structure (official VIDEO 3.0 Omni examples) ──────────────────
  - "Single generation packs UP TO 6 shots and UP TO 15 seconds total. Each shot is an explicit block; per-shot duration may be 2-15s (short cutaways of 2s are valid) but the shot count must be <=6 and the sum must be <=15s."
  - "Format A (silent / standard): write each shot as 'Shot N (Xs): <framing>. <subject action + @Element + camera behavior>.' Use 'Cut to <framing>' to mark each transition. Example: 'Shot 2 (2s): Cut to close-up. @Element1's profile is half-hidden in shadow.'"
  - "Format B (native audio): write each shot as a timecode block '[MM:SS - MM:SS] <shot type>: @Element <action>. Audio: <ambient/sfx cue>.' with inline dialogue as '— <Name>: \"<line>\"'. Example: '[00:00 - 00:02] Medium shot: @Goro gestures with a lit cigarette... Audio: faint cigarette crackle.'"
  - "Describe ACTION and CAMERA over time, NOT appearance. Identity, wardrobe, and look are carried by the attached @Elements, not re-described in the shot text."
  - "Continuity across shots: keep the same @Elements attached and use linking words ('continuing', 'immediately', 'then') and consistent screen direction so the model does not reset the scene at each cut."
  - "End-state required per clip: describe how the final action settles to prevent 99% generation hang."
  # ── Multi-character / anti-clone (official Element + guide rules) ─────────────
  - "Each distinct on-screen figure MUST be its own @Element/alias. Never use one alias for two physically distinct figures (causes blending/clones). On first mention, append a unique distinguishing detail, e.g. '@Kaiko, a young woman with a blonde buzzcut and a scar on her eyebrow'."
  - "State the exact figure count and forbid extras: 'exactly N figures: @A, @B; no additional, extra, or duplicated people.' This suppresses the known O3 extra-character/clone hallucination."
  # ── Elements / references (Element Library guide) ────────────────────────────
  - "Build each character element from ~4 multi-scale/angle references (full-body front, three-quarter waist, close portrait front, profile/back) for a 3D identity lock; include full-body so the model does not crop. Attach up to 4 elements per generation."
  - "Reference every element with its @alias in the prompt; do not paste raw descriptions for an element that already exists in the library."
  # ── Native audio / dialogue (Tier 1 API) ─────────────────────────────────────
  - "Native-audio dialogue is written inline in prompt_text (Format B); there is no separate audio/voice API parameter (Magnific Kling v3 Omni reference). Render each line action-first: physical action, speaker clause (@alias + tone), then the quoted line."
  - "Keep dialogue short and source-grounded; never invent lines. Prefer one speaking character focus per shot; place a temporal connector between consecutive speakers."
  # ── Camera / negative prompt ─────────────────────────────────────────────────
  - "Use professional camera terms (dolly, pan, tilt, zoom, crane, tracking, orbital, static); max 2 compatible movements stacked; specify motion intensity 0.1-1.0."
  - "Negative prompt supported (max 2500 chars); write terms directly (not 'no-term'); focus on motion artifacts (sliding feet, morphing, warping, flicker)."
  - "Never include canonical planning IDs (C01, LOC001, SC0001) or full display names in prompt_text; use @aliases only."
