prompting_rules:
  - "Write cinematic direction prompts with explicit shot movement and end-state."
  - "For multi-shot generations, label shots explicitly and keep continuity anchors stable."
  - "Use native audio only with explicit speech constraints and compatibility checks."
  - "Native-audio dialogue is written inline in prompt_text; there is no separate audio or voice API parameter (Magnific Kling v3 Omni API reference, Tier 1). The model converts in-prompt dialogue lines into synchronized speech and lip movement."
  - "Render each spoken line action-first: describe the physical action, then the speaker clause, then the quoted line. Example: 'She sets the glass down. @Nadia (controlled, low voice): \"I slept.\"'"
  - "Tag every spoken line with a stable, unique speaker label. In this repo the speaker label is the character's Kling element @alias (e.g. @Nadia), optionally followed by a parenthesised tone/delivery descriptor. Never use bare pronouns to mark a speaker."
  - "Place a temporal connector (Immediately, Then, After a pause) between consecutive speakers so the model does not merge speech across speakers."
  - "Keep dialogue lines short and source-grounded; never invent lines. Prefer one speaking character focus per shot."
