prompting_rules:
  - "Use narrative, descriptive sentences — NOT Midjourney comma-clauses. Structure: Subject → Context/environment → Artistic style."
  - "Add photography-specific modifiers: camera proximity (close-up, aerial, low-angle), lighting (natural, dramatic), effects (bokeh, depth of field), lens type (35mm, macro), film style (B&W, Polaroid)."
  - "gemini-3-pro-image-preview does NOT support negative_prompt parameter. Use semantic negation: rephrase as positive description instead of 'no cars' write 'empty deserted street with no signs of traffic'."
  - "Character consistency: upload up to 5 character reference images per prompt. Additionally up to 6 object fidelity images (14 total). Maintains facial features across iterations."
  - "Keep temperature at default 1.0. Do NOT adjust. Lowering causes looping and degraded output. top_p default 0.95; top_k fixed at 64."
  - "Maximum prompt length: 480 tokens. Keep prompts concise. Verbose prompts cause over-analysis and degradation."
  - "Supported aspect ratios: 1:1, 2:3, 3:2, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9. For cinematic use 16:9 or 21:9."
  - "For text within images: keep under 25 characters per phrase, max 2-3 phrases. Reliable within these limits."
  - "Critic MUST NOT flag missing negative_prompt for this model."
  - "Never include canonical IDs (C01, LOC001, PROP003, SC0001) or full character names. Use first-name only."
