prompting_rules:
  - "Use full, well-formed sentences describing what to create. Do NOT use Midjourney-style comma-separated clauses."
  - "gpt-image-2 has NO separate negative_prompt API parameter. All exclusions must be embedded in main prompt."
  - "Pattern: 'No watermark, no text overlay, no additional objects.' Adapter sets constraint_strategy: embedded_positive_constraints."
  - "For complex prompts, use labeled segments or line breaks. Structure: Scene → Subject → Details → Constraints."
  - "For exact text: enclose literals in double quotes or use ALL CAPS. Specify placement, hierarchy, font style. 95%+ accuracy for text including non-Latin scripts."
  - "For character identity across edits: provide explicit preserve list. 'Keep the same face, pose, lighting, background. Change only X.'"
  - "Quality parameter: 'low' (fast), 'medium' (default), 'high' (premium, slower). Stay under 2560x1440 for production consistency."
  - "Critic MUST NOT flag missing negative_prompt for this model."
  - "Never include canonical IDs (C01, LOC001, PROP003, SC0001) or full character names. Use first-name only."
