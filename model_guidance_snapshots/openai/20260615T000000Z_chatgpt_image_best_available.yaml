prompting_rules:
  - "Use full natural-language instructions; avoid Midjourney-style flag syntax."
  - "Embed exclusions directly in prompt text because no separate negative_prompt field exists."
  - "Use preserve lists for iterative edits to minimize identity drift."
  - "For multi-image reference input (shot still generation): upload per-shot element reference images as input_reference_images (≤16 total); each character/prop/location element occupies one input slot. A 22-shot scene must be split per-clip (≤6 stills per clip) — scene-wide upload exceeds the 16-image limit."
  - "For contact-sheet generation: supply the ordered per-shot stills (≤6 for a standard clip) as input images; compose a labeled panel grid in the prompt. Contact sheets are storyboard/QC references only, not identity-lock sources."
  - "Image size limit per input image: 50 MB. PNG, WebP, and JPG are accepted input formats."
  - "Output images per call: up to 10. For a 6-shot contact sheet, a single call produces 1 composite; for per-shot stills, batch ≤10 shots per call."
