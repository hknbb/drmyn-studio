# docs/model_guides/midjourney.yaml
# Locked versioned guide for Midjourney prompt generation.
# Maintained by: human PR only.
# Adapters and Critic read this file — never hardcode rules in adapter code.
# Source evidence: docs/model_guides/sources/midjourney_research_log.md

model_id: midjourney
schema_version: "1.0"
guide_version: "0.2.0"
status: active
last_updated: "2026-05-07"
maintained_by: "human PR only"
phase: 1
snapshot_ref: "evidence/model_guidance_snapshots/20260504T113000Z_midjourney.yaml"

capability:
  output_type: image
  supports_negative_prompt: limited   # --no flag only; not a separate field
  supports_image_reference: true      # --oref (V7+); --cref removed in V7
  supports_seed: true
  supports_consistency_reference: true  # --oref + --ow (Omni Reference, V7+)
  max_prompt_length: unlimited
  current_version: "V8.1 / V7 (default)"

prompt_rules:
  style: compact_visual_clauses
  max_words_recommended: 60           # Updated: diminishing returns after 60 (not 80)
  word_priority_window: 40            # First 40 words get strongest attention
  negative_prompt_format: "--no <term1>, <term2>"
  rules:
    - id: word_limit
      rule: >
        V8.1 has 74-token hard cap (tokenizer-based, not word count; tokens ≠ words).
        Target 40-50 meaningful words. First 40 words get strongest attention.
        Do not pad. V7 60-word heuristic is outdated for V8.1; precision matters more.
      source: "https://docs.midjourney.com/hc/en-us/articles/32199405667853-Version"
      confidence: high
      human_verified: true
    - id: subject_first
      rule: >
        Five-component structure: Subject → Scene → Style → Details → Parameters.
        Lead with the primary subject. Use specific material or camera terms
        instead of generic quality descriptors (not "ultra-detailed"; use
        "weathered oak" or "35mm lens f/2.8").
      source: "https://docs.midjourney.com/hc/en-us/articles/32023408776205-Prompt-Basics"
      confidence: high
      human_verified: true
    - id: compact_clauses
      rule: >
        V8.1 prefers natural language sentences over V7's comma-clause pattern.
        V8.1 is a literal executor: what you write is what you get (no creative gap-filling).
        Structure: Subject → Environment → Style/Aesthetics → Lighting → Technical Parameters.
        Explicit description replaces sparse prompting; be specific about scene direction.
      source: "https://docs.midjourney.com/hc/en-us/articles/32023408776205-Prompt-Basics"
      confidence: high
      human_verified: true
    - id: negative_via_no_flag
      rule: >
        Negative constraints use --no at the end of the prompt.
        Example: "... --no text overlays, motion blur, lens flare"
        IMPORTANT: --no splits on spaces, so "no modern clothing" becomes
        "--no modern" AND "--no clothing". Use hyphens for compounds:
        "--no [modern-clothing]" or rephrase. Effect is probabilistic (-0.5 weight).
      source: "https://docs.midjourney.com/hc/en-us/articles/32173351982093-No"
      confidence: high
      human_verified: true
    - id: omni_reference
      rule: >
        V7: --oref (Omni Reference) with --ow <1-1000> for character/object consistency.
        V8.1: --oref NOT available yet (on roadmap, not live as of May 2026).
        V8.1 workarounds: --seed for reproducible variants, --sref for style anchoring (--sv 7 for stability),
        --iw for image reference seeding. Operator must use V7 if --oref needed now.
      source: "https://updates.midjourney.com/omni-reference-oref/"
      confidence: high
      human_verified: true
    - id: aspect_ratio
      rule: >
        Cinematic: --ar 16:9 or --ar 2.39:1 (anamorphic). Portraits/characters: --ar 2:3 (standard).
        Always specify for production. V8.1 native 2K default; no separate upscale needed.
      source: "https://docs.midjourney.com/hc/en-us/articles/32859204029709-Parameter-List"
      confidence: high
      human_verified: true
    - id: pin_version
      rule: >
        Always specify --v 7, --v 8, or --v 8.1. V8.1 is the current full release (2026-04-30).
        Default is V7. Do not rely on default as it changes over time.
        Add --style raw for commercial/brand/character work to suppress built-in aesthetic bias.
      source: "https://docs.midjourney.com/hc/en-us/articles/32199405667853-Version"
      confidence: high
      human_verified: true
    - id: seed_for_reproducibility
      rule: >
        Use --seed <integer> to enable reproducibility across variants.
        Same seed + same prompt = similar results.
      source: "https://docs.midjourney.com/hc/en-us/articles/32859204029709-Parameter-List"
      confidence: high
      human_verified: true
    - id: no_canonical_ids_in_prompt
      rule: >
        Never include canonical IDs (C01, LOC001, PROP003, SC0001) in prompt_text.
        Never include character full display names (e.g. "Nadia Vale") — use
        first-name only ("Nadia"). They must appear only in source_refs.
        The Critic enforces both canonical ID and planning alias checks.
      source: "plan invariant"
      confidence: high
      human_verified: true
    - id: style_raw_for_production
      rule: >
        V8.1: Add --style raw to all character/commercial work.
        --style raw strips built-in aesthetic bias, giving photorealistic/controlled output.
        Default V8.1 can be over-processed; --style raw is production standard for portraits.
      source: "https://docs.midjourney.com/hc/en-us/articles/32634113811853-Raw-Mode"
      confidence: high
      human_verified: true
  do_not_invent:
    - "Prompt weighting syntax (::2) — not confirmed in V7/V8"
    - "--cref — removed in V7; use --oref instead"
    - "Seed parameter in V8.1 character consistency (use for reproducible variants only)"

