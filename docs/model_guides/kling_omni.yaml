# docs/model_guides/kling_omni.yaml
# Locked versioned guide for Kling Omni video generation.
# Kling 3.0 Omni (released 2026-02-05) — flagship as of May 2026.
# Maintained by: human PR only.
# Freshness policy: max_age_days: 7 (faster release cadence).
# Phase 3 Prerequisites: shot_list_omni non-empty + storyboard selected + fresh snapshot.
# Source evidence: evidence/model_guidance_snapshots/20260504T140000Z_kling_omni.yaml

model_id: kling_omni
schema_version: "1.0"
guide_version: "0.2.0"
status: active
last_updated: "2026-05-04"
maintained_by: "human PR only"
phase: 3
actual_model_id: "kling-3.0-omni"
snapshot_ref: "evidence/model_guidance_snapshots/20260504T140000Z_kling_omni.yaml"

capability:
  output_type: video
  supports_negative_prompt: true      # Corrected: Kling 3.0 Omni DOES support negative_prompt
  supports_elements: true             # Up to 3 element references per prompt
  supports_camera_motion: true        # Full cinematography control
  supports_multi_shot: true           # Up to 6 shots per generation
  supports_audio: true                # Native audio synthesis in 3.0 Omni
  supports_image_to_video: true
  supports_text_to_video: true
  max_duration_seconds: 15            # Corrected: 3-15s (was 10)
  native_fps: 30
  native_resolution: "4K"
  current_version: "Kling 3.0 Omni"

prompt_rules:
  style: cinematic_direction_spec
  prompt_text_max_chars: 2500         # Hard limit: API rejects prompts over 2500 characters
  recommended_words_t2v: "30–60 concise cinematic direction"
  soft_warning_words_t2v: 100         # Soft threshold: prefer under 100 words; not an API limit
  max_words_i2v: 40                   # Image-to-video: motion description only
  negative_prompt_max_chars: 2500
  rules:
    - id: cinematic_direction_not_inventory
      rule: >
        Write prompts as cinematic shot directions, NOT visual inventories.
        Focus on: shot composition, camera movement, and narrative flow.
        WRONG: "a kitchen with a table, chairs, and soft morning light"
        RIGHT: "dolly forward through the threshold, revealing the kitchen
        passage in filtered morning daylight, camera settling on Nadia's route"
      source: "https://blog.fal.ai/kling-3-0-prompting-guide/"
      confidence: high
      human_verified: true
    - id: prompt_length_t2v
      rule: >
        Text-to-video: 30–60 words optimal for simple shots. For element-based
        multi-shot Omni prompts with required @ alias references, shot
        directions, and continuity metadata, more words are expected and
        acceptable. Hard limit: 2500 characters (API). Soft guidance: prefer
        under 100 words when shot content allows; not a hard limit.
        Image-to-video: 15–40 words; describe motion ONLY, never redescribe
        visuals already in the source image.
      source: "https://docs.magnific.com/api-reference/video/kling-v3-omni/generate-std-video-reference"
      confidence: high
      human_verified: true
    - id: multi_shot_structure
      rule: >
        For multi-shot content, label each shot explicitly:
        "Shot 1: Wide establishing shot of ... Shot 2: Close-up tracking of ..."
        Up to 6 shots per generation. Specify framing, subject movement,
        and transitions per shot.
      source: "https://www.veed.io/learn/kling-ai-prompting-guide"
      confidence: high
      human_verified: true
    - id: camera_motion_terminology
      rule: >
        Use professional cinematography terms for physics-aware rendering.
        dolly (generates real parallax), pan, tilt, zoom, crane, tracking/follow,
        orbital/arc, static/lock. Advanced: dutch angles, whip pan, rack focus,
        dolly zoom. Max 2 compatible movements stacked simultaneously.
        "dolly forward" ≠ "move forward" — use correct term for correct physics.
      source: "https://www.kling3.online/tutorials/motion-control.html"
      confidence: high
      human_verified: true
    - id: motion_intensity_scale
      rule: >
        Always specify motion intensity on 0.1–1.0 scale:
        0.1–0.3 = subtle (breathing, slight sway, minimal camera drift)
        0.4–0.6 = natural/moderate (walking, gestures, smooth pan)
        0.7–1.0 = dynamic/energetic (running, rapid camera movement)
      source: "https://blog.fal.ai/kling-3-0-prompting-guide/"
      confidence: high
      human_verified: true
    - id: end_state_required
      rule: >
        Always specify how the action resolves to prevent 99% hang bug.
        WRONG: "dolly forward through the crowd"
        RIGHT: "dolly forward through the crowd, then settles back"
        An explicit end state anchors the generation timeline.
      source: "https://blog.fal.ai/kling-3-0-prompting-guide/"
      confidence: high
      human_verified: true
    - id: character_consistency
      rule: >
        Define subjects with unique visual identifiers at the start and maintain
        consistent descriptions throughout multi-shot sequences.
        Example: "Nadia, lean upright posture, muted grey linen"
        Avoid vague references; use specific descriptors from character sheet.
      source: "https://www.veed.io/learn/kling-ai-prompting-guide"
      confidence: high
      human_verified: true
    - id: negative_prompt_format
      rule: >
        negative_prompt is supported (max 2500 chars). Write terms directly
        WITHOUT "no" prefix — write "blur" not "no blur".
        Default value when omitted: "blur, distort, low quality".
        Focus on motion artifacts: sliding-feet, morphing, warping,
        floating-objects, flickering. Keep to 3–7 items.
        Use as a preventive measure, not a fix for failed generations.
      source: "https://filmora.wondershare.com/ai-prompt/kling-ai-negative-prompt.html"
      confidence: high
      human_verified: true
    - id: phase_3_gate
      rule: >
        Kling Omni adapter is blocked until Phase 3 conditions are met:
        1. selected_option non-null (storyboard direction chosen)
        2. shot_list_omni non-empty in scene_card.yaml
        3. This guide status: active (done)
        4. Fresh snapshot < 7 days old in evidence/model_guidance_snapshots/
      source: "plan Phase 3 gate conditions"
      confidence: high
      human_verified: true
    - id: no_canonical_ids_in_prompt
      rule: >
        Never include canonical IDs (C01, LOC001, SC0001) or character full
        display names in prompt_text. Use first-name only ("Nadia").
        Critic enforces both canonical ID and planning alias checks.
      source: "plan invariant"
      confidence: high
      human_verified: true

  do_not_invent:
    - "Seed parameter — not exposed in official Kling 3.0 Omni API"
    - "Element reference upload format — verify @element_name syntax in current API"
    - "Exact cfg_scale range — confirmed 0-1.0 but verify edge behavior"
    - "Audio generation prompt syntax — native audio in 3.0 Omni; verify current format"

