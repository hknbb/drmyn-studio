# docs/model_guides/kling_omni.yaml
# Locked versioned guide for Kling Omni video generation.
# Kling 3.0 Omni (released 2026-02-05) - flagship as of June 2026.
# Maintained by: human PR only.
# Freshness policy: max_age_days: 7 (faster release cadence).
# Generation prerequisite: valid omni_clip_manifest + fresh snapshot.
# Source evidence: model_guidance_snapshots/kling/20260615T000000Z_kling_omni_video_best_available.yaml

model_id: kling_omni
schema_version: "1.0"
guide_version: "0.7.0"
status: active
last_updated: "2026-06-15"
maintained_by: "human PR only"
phase: 3
actual_model_id: "kling-3.0-omni"
snapshot_ref: "model_guidance_snapshots/kling/20260615T000000Z_kling_omni_video_best_available.yaml"

capability:
  output_type: video
  supports_negative_prompt: true      # Corrected: Kling 3.0 Omni DOES support negative_prompt
  supports_elements: true             # Official guide: up to 7 images/elements without video input; up to 4 with video input
  supports_camera_motion: true        # Full cinematography control
  supports_multi_shot: true           # Up to 6 shots per generation
  supports_audio: true                # Native audio synthesis in 3.0 Omni
  supports_image_to_video: true
  supports_text_to_video: true
  max_duration_seconds: 15            # Official guide: up to 15s
  native_fps: 30
  native_resolution: "4K"
  current_version: "Kling 3.0 Omni"

prompt_rules:
  style: cinematic_direction_spec
  prompt_text_max_chars: 2500         # Hard limit: API rejects prompts over 2500 characters
  recommended_words_t2v: "30–60 concise cinematic direction"
  soft_warning_words_t2v: 100         # Soft threshold: prefer under 100 words; not an API limit
  max_words_i2v: 40                   # Image-to-video: motion description only
  negative_prompt_max_chars: 2500
  rules:
    - id: cinematic_direction_not_inventory
      rule: >
        Write prompts as cinematic shot directions, NOT visual inventories.
        Focus on: shot composition, camera movement, and narrative flow.
        WRONG: "a kitchen with a table, chairs, and soft morning light"
        RIGHT: "dolly forward through the threshold, revealing the kitchen
        passage in filtered morning daylight, camera settling on Nadia's route"
      source: "https://blog.fal.ai/kling-3-0-prompting-guide/"
      confidence: high
      human_verified: true
    - id: prompt_length_t2v
      rule: >
        Text-to-video: 30–60 words optimal for simple shots. For element-based
        multi-shot Omni prompts with required @ alias references, shot
        directions, and continuity metadata, more words are expected and
        acceptable. Hard limit: 2500 characters (API). Soft guidance: prefer
        under 100 words when shot content allows; not a hard limit.
        Image-to-video: 15–40 words; describe motion ONLY, never redescribe
        visuals already in the source image.
      source: "https://docs.magnific.com/api-reference/video/kling-v3-omni/generate-std-video-reference"
      confidence: high
      human_verified: true
    - id: multi_shot_structure
      rule: >
        For multi-shot content, label each shot explicitly with duration and
        timecode: "Shot 1 (3s): [00:00 - 00:03] Medium shot: ...".
        Up to 6 shots per generation. Specify framing, camera angle, subject
        movement, audio cue/dialogue when used, and the cut/transition per shot.
        Shot-count cap: the omni_clip_manifest path allows up to 6 shots within
        the 15s budget (model maximum). The legacy deterministic generate() gate
        (_allowed_shot_count) is intentionally CONSERVATIVE — it caps at 2 shots
        for <=5s and 5 shots for <=10s — to avoid over-cutting short clips; this
        is a repo policy, not a model limit.
      source: "https://kling.ai/quickstart/klingai-video-3-omni-model-user-guide"
      confidence: high
      human_verified: true
    - id: timecoded_shot_directions
      rule: >
        Scene prompts preserve emotional meaning through shot rhythm and
        coverage: cover a beat with DISTINCT shots (establish -> reaction/insert
        -> reverse -> resolve), use 2-4s cutaways/close-ups for reaction, reveal,
        prop, or pressure, and reserve a single long take only when the scene
        needs continuous performance. Render each shot Goro-style, timecode-first,
        with camera/movement/performance woven into prose (NOT Camera:/Lighting:/
        Motion: telemetry): "[MM:SS - MM:SS] <Framing label>: <action + @Element +
        performance>. <natural camera sentence>. Audio: <diegetic cue>." No
        "Shot N (Xs):" prefix and no added "Cut to" — the timecode block is the
        cut. The framing label comes from coverage_role (Insert/Cutaway/Reverse
        angle) then camera.framing (Wide shot/Medium shot/Close-up). Structured
        camera/lighting/motion stay in the manifest for QC only.
      source: "https://kling.ai/quickstart/klingai-video-3-omni-model-user-guide"
      confidence: high
      human_verified: true
    - id: intra_shot_state_chaining
      rule: >
        Continuity is a chain, not a reset. Open every shot by restating the
        carried world state — where each on-screen subject/prop is as the shot
        begins (the prior shot's settled end) — BEFORE the new action, so Kling
        keeps positions instead of re-randomising them at each cut. In this repo
        the data lives in omni_clip_manifest shots[].entry_state / exit_state
        (summary + key_positions{subject @alias, screen_position, posture,
        relation, gaze_target, visibility} + props_state), authored to chain
        exit_state(N) == entry_state(N+1) within a clip and to match the
        scene_continuity_ledger entry/exit at the clip seam. The renderer prints
        the carried state as the shot's opening clause. "The more explicit the
        transitions, the cleaner the result." Enforced by validate_state_chain
        (ENTRY_STATE_MISSING_AFTER_FIRST_SHOT, SHOT_EXIT_STATE_MISSING,
        CARRIED_SUBJECT_DROPPED, CARRIED_PROP_DROPPED, RELATION_BROKEN_WITHOUT_ACTION,
        CLIP_SEAM_MISMATCH).
      source: "https://blog.fal.ai/kling-3-0-prompting-guide/"
      confidence: high
      human_verified: true
    - id: per_character_action_binding
      rule: >
        In a shot with two or more on-screen figures (or any dialogue), give EACH
        figure its own distinct action clause — never lump several actions into one
        sentence, which makes the model "not know who slammed the table". Bind the
        action to a unique, consistent character label (the figure's @alias; avoid
        pronouns/synonyms), and for dialogue render the action first, then the
        quoted line. In this repo the per-figure action lives in
        omni_clip_manifest shots[].figures[].action; the shot's prompt_action stays
        environment-only. Enforced by validate_state_chain (FIGURE_ACTION_MISSING
        for on-frame figures in multi-figure/dialogue shots;
        CHARACTER_ACTION_DUPLICATED_IN_PROMPT_ACTION is an advisory warning).
      source: "https://blog.fal.ai/kling-3-0-prompting-guide/"
      confidence: high
      human_verified: true
    - id: camera_motion_terminology
      rule: >
        Use professional cinematography terms for physics-aware rendering.
        dolly (generates real parallax), pan, tilt, zoom, crane, tracking/follow,
        orbital/arc, static/lock. Advanced: dutch angles, whip pan, rack focus,
        dolly zoom. Max 2 compatible movements stacked simultaneously.
        "dolly forward" ≠ "move forward" — use correct term for correct physics.
      source: "https://www.kling3.online/tutorials/motion-control.html"
      confidence: high
      human_verified: true
    - id: motion_intensity_scale
      rule: >
        Always specify motion intensity on 0.1–1.0 scale:
        0.1–0.3 = subtle (breathing, slight sway, minimal camera drift)
        0.4–0.6 = natural/moderate (walking, gestures, smooth pan)
        0.7–1.0 = dynamic/energetic (running, rapid camera movement)
      source: "https://blog.fal.ai/kling-3-0-prompting-guide/"
      confidence: high
      human_verified: true
    - id: end_state_required
      rule: >
        Always specify how the action resolves to prevent 99% hang bug.
        WRONG: "dolly forward through the crowd"
        RIGHT: "dolly forward through the crowd, then settles back"
        An explicit end state anchors the generation timeline.
      source: "https://blog.fal.ai/kling-3-0-prompting-guide/"
      confidence: high
      human_verified: true
    - id: character_consistency
      rule: >
        Define subjects with unique visual identifiers at the start and maintain
        consistent descriptions throughout multi-shot sequences.
        Example: "Nadia, lean upright posture, muted grey linen"
        Avoid vague references; use specific descriptors from character sheet.
      source: "https://www.veed.io/learn/kling-ai-prompting-guide"
      confidence: high
      human_verified: true
    - id: negative_prompt_format
      rule: >
        negative_prompt is supported (max 2500 chars). Write terms directly
        WITHOUT "no" prefix — write "blur" not "no blur".
        Default value when omitted: "blur, distort, low quality".
        Focus on motion artifacts: sliding-feet, morphing, warping,
        floating-objects, flickering. Keep to 3–7 items.
        Use as a preventive measure, not a fix for failed generations.
      source: "https://filmora.wondershare.com/ai-prompt/kling-ai-negative-prompt.html"
      confidence: high
      human_verified: true
    - id: clip_manifest_gate
      rule: >
        Kling Omni prompt generation is blocked until clip-manifest conditions
        are met:
        1. omni_clip_manifest.shots is non-empty
        2. total_duration_seconds <= 15 and shot count <= 6
        3. every required figure/element has an attached @alias
        4. prompt cites this locked guide or a run-specific guidance snapshot
      source: "repo clip-manifest gate"
      confidence: high
      human_verified: true
    - id: no_canonical_ids_in_prompt
      rule: >
        Never include canonical IDs (C01, LOC001, SC0001) or character full
        display names in prompt_text. Use first-name only ("Nadia").
        Critic enforces both canonical ID and planning alias checks.
      source: "plan invariant"
      confidence: high
      human_verified: true
    - id: native_audio_dialogue_format
      rule: >
        Kling 3.0 Omni native-audio dialogue is written inline in prompt_text;
        the API exposes NO separate audio/voice/dialogue parameter (Tier 1:
        Magnific Kling v3 Omni API reference). Render each spoken line
        action-first: physical action sentence, then the speaker clause, then
        the quoted line. Tag every line with a stable speaker label — in this
        repo the character's Kling element @alias (e.g. @Nadia), optionally
        followed by a parenthesised tone/delivery descriptor. Never mark a
        speaker with a bare pronoun. Place a temporal connector (Immediately,
        Then, After a pause) between consecutive speakers so speech is not
        merged. Keep lines short and source-grounded; never invent dialogue.
        The verbatim line is rendered in the SPEAKING shot and is ALWAYS present
        as on-screen dialogue text — decoupled from voice: render_pass and
        native_audio_readiness only gate whether Kling also generates spoken
        VOICE (audio_gate_status), never whether the text appears.
        Example: 'She sets the glass down. — @Nadia (controlled, low voice):
        "I slept." Immediately, @Birta (warm, knowing tone): "You slept the
        way you fold laundry."'
      source: "model_guidance_snapshots/kling/20260613T000000Z_kling_omni_video_best_available.yaml"
      confidence: high
      human_verified: true

  do_not_invent:
    - "Seed parameter — not exposed in official Kling 3.0 Omni API"
    - "Element reference upload format — verify @element_name syntax in current API"
    - "Exact cfg_scale range — confirmed 0-1.0 but verify edge behavior"

