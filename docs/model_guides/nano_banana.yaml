# docs/model_guides/nano_banana.yaml
# Locked versioned guide for Nano Banana Pro prompt generation.
# Nano Banana Pro = gemini-3-pro-image-preview (Google Gemini 3 Pro Image)
# Maintained by: human PR only.
# Key capability: character/object consistency via reference images (up to 14 per prompt).
# CRITICAL: supports_negative_prompt is false — use semantic negation in prompt text.
# Source evidence: evidence/model_guidance_snapshots/20260504T120000Z_nano_banana.yaml

model_id: nano_banana
schema_version: "1.0"
guide_version: "0.2.0"
status: active
last_updated: "2026-05-04"
maintained_by: "human PR only"
phase: 1
actual_model_id: "gemini-3-pro-image-preview"
snapshot_ref: "evidence/model_guidance_snapshots/20260504T120000Z_nano_banana.yaml"

capability:
  output_type: image
  supports_negative_prompt: false     # NOT supported; use semantic negation in prompt
  supports_identity_consistency: true # Up to 5 character reference images per prompt
  supports_object_fidelity: true      # Up to 6 object reference images per prompt
  supports_variation_prompting: true
  supports_seed: false
  supports_4k: true                   # Native 4K (added 2026-02-26)
  current_version: "gemini-3-pro-image-preview"
  max_prompt_tokens: 480
  max_reference_images: 14            # 6 object + 5 character + 3 flexible

prompt_rules:
  style: narrative_cinematic_description
  max_tokens_recommended: 480         # Hard limit; keep prompts concise
  negative_prompt_format: "semantic negation embedded in positive prompt"
  rules:
    - id: narrative_structure
      rule: >
        Use narrative, descriptive sentences — NOT Midjourney-style comma-clauses.
        Structure: Subject → Context/environment → Artistic style/approach.
        Example: "The sun sets across the lake in golden hour with red wildflowers"
        not "lake, sunset, flowers, wildflowers".
      source: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/image/img-gen-prompt-guide"
      confidence: high
      human_verified: true
    - id: cinematic_modifiers
      rule: >
        Add photography-specific modifiers for production control:
        camera proximity (close-up, zoomed-out, aerial, low-angle),
        lighting (natural, dramatic, warm, cold fluorescent),
        effects (bokeh, soft focus, motion blur, depth of field),
        lens type (wide-angle, macro, fisheye, 35mm),
        film style (B&W, Polaroid, cinematic grain).
      source: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/image/img-gen-prompt-guide"
      confidence: high
      human_verified: true
    - id: no_negative_prompt
      rule: >
        gemini-3-pro-image-preview does NOT support a negative_prompt parameter.
        Use semantic negation instead: describe what you want positively.
        Example: instead of "no cars", write "an empty deserted street with no signs
        of traffic". Avoid using the word "no" or "don't" directly in prompts
        — rephrase as a positive description.
        The Critic MUST NOT flag missing negative_prompt for this model.
      source: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/image/omit-content-using-a-negative-prompt"
      confidence: high
      human_verified: true
    - id: character_consistency_reference
      rule: >
        Upload up to 5 character reference images per prompt for identity consistency.
        Additionally up to 6 object fidelity images (14 reference images total).
        Maintains facial features and identity across iterations.
        Works best with detailed pose references; occasional inconsistency with
        specific artistic styles is documented behaviour.
      source: "https://ai.google.dev/gemini-api/docs/image-generation"
      confidence: high
      human_verified: true
    - id: temperature_default
      rule: >
        Keep temperature at default 1.0. Do NOT adjust.
        Lowering temperature causes looping, unexpected behavior, and degraded output.
        top_p default 0.95; top_k fixed at 64 (not user-adjustable).
      source: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/models/gemini/3-pro-image"
      confidence: high
      human_verified: true
    - id: prompt_length_limit
      rule: >
        Maximum prompt length: 480 tokens. Keep prompts concise.
        Verbose or overly complex prompts cause over-analysis and degraded output.
        Direct instructions only — no persuasive language (please, would you).
      source: "https://ai.google.dev/gemini-api/docs/imagen"
      confidence: high
      human_verified: true
    - id: aspect_ratio
      rule: >
        Supported aspect ratios: 1:1, 2:3, 3:2, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9.
        For cinematic production use 16:9 or 21:9.
        Resolution: 2K (1120 tokens) or 4K (2000 tokens). 4K available since 2026-02-26.
      source: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/models/gemini/3-pro-image"
      confidence: high
      human_verified: true
    - id: in_image_text
      rule: >
        For text within generated images: keep under 25 characters per phrase,
        max 2-3 distinct phrases. Text rendering is reliable within these limits.
      source: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/image/img-gen-prompt-guide"
      confidence: high
      human_verified: true
    - id: no_canonical_ids_in_prompt
      rule: >
        Never include canonical IDs (C01, LOC001, PROP003, SC0001) or character
        full display names (e.g. "Nadia Vale") in prompt_text. Use first-name
        only ("Nadia"). They must appear only in source_refs.
        The Critic enforces both canonical ID and planning alias checks.
      source: "plan invariant"
      confidence: high
      human_verified: true

  do_not_invent:
    - "A negative_prompt parameter — it does not exist in gemini-3-pro-image-preview"
    - "A seed parameter — not supported"
    - "-- flag syntax (Midjourney-style parameters are not applicable)"
    - "Prompt weighting syntax — not applicable"

source_refs:
  - url: "https://ai.google.dev/gemini-api/docs/image-generation"
    source_class: official_docs
    human_verified: true
    notes: "Gemini API image generation guide. Nano Banana Pro specs, 14 reference images, character consistency. Retrieved 2026-05-04."
  - url: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/models/gemini/3-pro-image"
    source_class: official_docs
    human_verified: true
    notes: "Vertex AI model spec. Context limits, temperature, aspect ratios, token costs. Retrieved 2026-05-04."
  - url: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/image/img-gen-prompt-guide"
    source_class: official_docs
    human_verified: true
    notes: "Vertex AI prompt guide. Narrative structure, photography modifiers, text limits. Retrieved 2026-05-04."
  - url: "https://docs.cloud.google.com/vertex-ai/generative-ai/docs/image/omit-content-using-a-negative-prompt"
    source_class: official_docs
    human_verified: true
    notes: "Confirms negative_prompt NOT available in gemini-3-pro-image-preview. Semantic negation required. Retrieved 2026-05-04."
  - url: "https://deepmind.google/models/gemini-image/pro/"
    source_class: verified_platform_blog
    human_verified: true
    notes: "Google DeepMind product page. 4K support, character consistency up to 5 people. Retrieved 2026-05-04."

