extracted_rules:
- Current model is gpt-image-2 (released 2026-04-21). DALL-E 3 is deprecated (2026-05-12). Previous identifier chatgpt_image
  maps to gpt-image-2 in production.
- Use natural language instructions, NOT Midjourney-style comma-clauses. Full sentences and paragraph descriptions work best.
- 'Prompt order: Background/scene → Subject → Key details → Constraints. Readable structure beats compact syntax.'
- 'NO separate negative_prompt parameter in the API. Embed all exclusions and constraints in the main prompt text. Example:
  No watermark, no text overlay, no additional objects.'
- 'For exact text rendering: enclose literals in double quotes or use ALL CAPS. Specify placement, hierarchy, font style.
  95%+ accuracy for headlines and labels including non-Latin scripts.'
- 'For iterative editing: always provide explicit preserve list. Keep the same face, pose, lighting, background. Change only
  X.'
- 'For complex requests, use labeled segments or line breaks: Scene: / Subject: / Details: / Constraints: — readability helps
  the reasoning mode understand intent.'
- Character identity across edits requires explicit preserve instructions, not a single reference image. Use multi-turn iterative
  prompts with preserve lists.
- 'Quality parameter: low (fast), medium (default), high (premium). Stay under 2560x1440 for production consistency; above
  is experimental.'
- Never include canonical planning IDs (C01, LOC001, SC0001) or character full display names in prompt_text. Use first-name
  only for character references.
