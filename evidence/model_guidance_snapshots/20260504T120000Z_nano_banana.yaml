extracted_rules:
- 'Actual model: gemini-3-pro-image-preview (Nano Banana Pro). Imagen 4 deprecated June 24, 2026. Use gemini-3-pro-image-preview
  for all new production pipelines.'
- 'Narrative prompt structure: Subject → Context/environment → Artistic style/approach. Use descriptive sentences, NOT keyword
  comma-lists.'
- 'Photography modifiers for cinematic control: camera proximity (close-up/aerial/low-angle), lighting (natural/dramatic/warm),
  lens type (wide-angle/macro/fisheye), effects (bokeh/depth-of-field), film style (B&W/Polaroid).'
- 'NO negative_prompt parameter. Use semantic negation instead: describe positively what you want. Example: instead of no
  cars, write an empty deserted street with no signs of traffic.'
- 'Character consistency: upload up to 5 character reference images + up to 6 object fidelity images (14 reference images
  total per prompt). Maintains facial features and identity across iterations.'
- 'Temperature: keep at default 1.0. Lowering causes looping, unexpected behavior, and degraded output. Do not adjust.'
- 'Maximum prompt length: 480 tokens. Keep prompts concise and clear; verbose prompts cause over-analysis.'
- 'Aspect ratios supported: 1:1, 2:3, 3:2, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9. For cinematic production use 16:9 or 21:9.'
- 4K native resolution available (2K=1120 tokens, 4K=2000 tokens). 4K added 2026-02-26. Budget token costs accordingly for
  batch production.
- 'For in-image text: keep under 25 characters per phrase, max 2-3 distinct phrases. Text rendering is reliable within these
  limits.'
- Never include canonical planning IDs (C01, LOC001, SC0001) or character full display names (e.g. Nadia Vale) in prompt_text.
  Use first-name only. The Critic enforces these checks.
- Do not use persuasive language (please, would you) in prompts. Direct instructions only.
