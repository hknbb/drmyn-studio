extracted_rules:
- 'Current model: Kling 3.0 Omni (released 2026-02-05). Unified multimodal: video + native audio + images in single generation.
  4K native, 30fps, 16-bit HDR.'
- 'Prompt style: cinematic direction, NOT visual inventory. Write like shot notes: composition, camera movement, narrative
  flow. Example: dolly forward through threshold, revealing kitchen passage not a kitchen with a table and chairs.'
- 'Text-to-video prompt length: 30-60 words optimal; max 100 words (above 100 causes generation hang at 99% completion). Image-to-video:
  15-40 words, describe motion ONLY (not visuals already in source image).'
- 'Multi-shot structure: label each shot explicitly (Shot 1: ..., Shot 2: ...). Up to 6 shots per generation. Specify framing,
  subject movement, and transitions per shot.'
- 'Camera motion: use professional cinematography terms for physics-aware rendering. dolly (real parallax), pan, tilt, zoom,
  crane, tracking/follow, orbital/arc, static. Max 2 compatible movements stacked simultaneously.'
- 'Motion intensity scale 0.1-1.0: 0.1-0.3=subtle (breathing, slight sway), 0.4-0.6=natural (walking, gestures), 0.7-1.0=dynamic
  (running, dancing). Always specify intensity.'
- 'End-state descriptions required: specify how action resolves to prevent 99% generation hang. Example: dolly forward through
  the crowd, then settles back not just dolly forward through crowd.'
- 'Character consistency: define subjects with unique identifiers early (a woman in grey linen, lean upright posture). Maintain
  consistent description throughout multi-shot sequences.'
- 'Negative prompt: SUPPORTED (max 2500 chars). Write term directly, not no-term. Default: blur, distort, low quality. Focus
  on motion artifacts: sliding feet, morphing, warping, floating objects, flickering.'
- 'Image-to-video: motion-only prompting. Never redescribe visuals in source image. Focus exclusively on camera movement and
  subject motion changes.'
- 'Audio/dialogue: label speakers with tone descriptors. Character A (hesitant voice): dialogue or Character B (controlled
  serious voice): dialogue.'
- Never include canonical planning IDs (C01, LOC001, SC0001) or character full display names in prompt_text. First-name only.
  Critic enforces both checks.
- 'Phase 3 prerequisites: shot_list_omni non-empty in scene_card, selected_option non-null, element packs at appropriate lock
  state, this guide active, fresh snapshot < 7 days.'
