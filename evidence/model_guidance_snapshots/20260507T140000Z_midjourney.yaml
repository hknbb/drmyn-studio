extracted_rules:
- Current default model is V7; V8.1 is full release (2026-04-30, not alpha). Pin with --v 7, --v 8, or --v 8.1 explicitly.
- V8.1 has 74-token hard cap (tokenizer-based, not word count). Target 40-50 meaningful words. V7 60-word heuristic is outdated.
- 'V8.1 prompt structure: Subject → Environment → Style/Aesthetics → Lighting → Technical Parameters. Use natural language sentences (not comma-clauses). Explicit beats sparse; literal executor adds nothing you didn''t ask for.'
- V8.1 is a literal executor. V7 filled gaps creatively; V8.1 does not. Specify lighting, materials, mood explicitly in natural language.
- Use --ar for aspect ratio. Cinematic: --ar 16:9 or --ar 2.39:1 (anamorphic). Portraits/characters: --ar 2:3 (standard). Always specify for production.
- 'Negative constraints via --no at end of prompt. Format: --no term1, term2. In V8.1, more reliable than V7. CRITICAL: Multi-word terms MUST be hyphenated: --no beauty-lighting (not beauty lighting).'
- --oref (Omni Reference) available in V7 for character/object consistency. NOT available in V8.1 (roadmap pending). V8.1 workarounds: --seed for reproducible variants, --sref (--sv 7) for style anchoring, --iw for image seeding.
- Use --seed <integer> for reproducibility. Same seed + same prompt produces similar results across runs.
- Add --style raw to all character/commercial work in V8.1. Strips aesthetic bias; production standard for portraits.
- Never include canonical planning IDs (C01, LOC001, SC0001) or character surnames in prompt_text.
