extracted_rules:
- Current default model is V7; V8.1 is available on alpha.midjourney.com (faster, HD mode, better prompt adherence). Pin with
  --v 7 or --v 8 explicitly.
- 'Optimal prompt length: under 60 words. Prioritise subject/scene in first 40 words. Attention drops sharply after 60 words.'
- 'Prompt structure order: Subject → Scene → Style → Details → Parameters. Specificity beats generic quality terms (use material
  or lens terms, not ultra-detailed).'
- Comma-separated noun phrases work better than full sentences. Midjourney parses prompts word-by-word, not syntactically.
- Use --ar for aspect ratio (--ar 16:9 cinematic, --ar 2.39:1 anamorphic, --ar 1:1 square). Always specify for production
  shots.
- 'Negative constraints via --no at end of prompt. Format: --no term1, term2. Probabilistic, not absolute. Multi-word terms
  are split word-by-word; use hyphens for compound exclusions: --no [modern-clothing].'
- --cref (character reference) is REMOVED in V7 and later. Use --oref (Omni Reference) with --ow weight parameter instead.
- Use --seed <integer> for reproducibility. Same seed + same prompt produces similar results across runs.
- Never include canonical planning IDs (C01, LOC001, SC0001) or character surnames in prompt_text.
- 'Avoid generic descriptors: ultra-detailed, high quality, amazing. Use specific material, texture, or camera terms instead.'
