name: Bug report
description: Report a validation, governance, schema, or planning bug
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly.
      placeholder: What went wrong?
    validations:
      required: true

  - type: input
    id: scope
    attributes:
      label: Affected scope
      description: Scene ID, character ID, file path, or workflow name
      placeholder: SC0006 / planning/scenes/SC0006/scene_card.yaml
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Validation output / logs
      description: Paste CI logs or local validation output if available.
