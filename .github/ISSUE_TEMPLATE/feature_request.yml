name: Feature request
description: Propose a new GitHub workflow, validation rule, or planning capability
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this request solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired feature in detail.
    validations:
      required: true

  - type: textarea
    id: phase_scope
    attributes:
      label: Phase scope
      description: Explain how this fits Zone 1 / Phase 1.
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks or trade-offs
