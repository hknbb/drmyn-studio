name: Phase 2 Taxonomy Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Create or update Phase 2 labels
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const labels = [
              { name: "phase-2", color: "1D76DB", description: "Phase 2 visual development work" },
              { name: "phase-2-visual-dev", color: "0E8A16", description: "Phase 2 visual development tasks" },
              { name: "phase-2-motion-prep", color: "5319E7", description: "Phase 2 motion preparation tasks" },

              { name: "asset-character", color: "C5DEF5", description: "Character pack task" },
              { name: "asset-location", color: "BFDADC", description: "Location sheet task" },
              { name: "asset-prop", color: "F9D0C4", description: "Prop pack task" },
              { name: "asset-wardrobe", color: "FCE883", description: "Wardrobe pack task" },
              { name: "asset-still", color: "D4C5F9", description: "Still set task" },
              { name: "asset-motion-pair", color: "E4E669", description: "Motion pair task" },
              { name: "asset-evidence", color: "F7C6C7", description: "Article 3 evidence task" },

              { name: "continuity-risk", color: "D93F0B", description: "Continuity-sensitive task" },
              { name: "review-needed", color: "FBCA04", description: "Needs review" },
              { name: "freeze-candidate", color: "0052CC", description: "Candidate for freeze" },
              { name: "article3-evidence", color: "B60205", description: "Candidate or approved for Article 3 evidence" },
              { name: "blocked", color: "000000", description: "Blocked task" },
              { name: "depends-on", color: "AAAAAA", description: "Depends on another task" },

              { name: "task", color: "EDEDED", description: "General task" },
              { name: "enhancement", color: "84B6EB", description: "Enhancement" },
              { name: "documentation", color: "0075CA", description: "Documentation" },
              { name: "pipeline", color: "5319E7", description: "Pipeline or automation task" },
              { name: "qa", color: "C2E0C6", description: "Quality assurance task" }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description
                });
                core.info(`Updated label: ${label.name}`);
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  core.info(`Created label: ${label.name}`);
                } else {
                  throw error;
                }
              }
            }

      - name: Create Phase 2 milestones if missing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const milestones = [
              {
                title: "P2-Batch-01 Reference Packs",
                description: "Character, location, prop, and wardrobe reference packs for Batch 01",
                due_on: "2026-04-30T23:59:59Z"
              },
              {
                title: "P2-Batch-01 Scene Stills",
                description: "Still generation and curation for SC0001, SC0003, SC0006, SC0008, SC0009",
                due_on: "2026-05-06T23:59:59Z"
              },
              {
                title: "P2-Batch-01 Motion Prep",
                description: "Motion-ready frame pairs and evidence panel preparation",
                due_on: "2026-05-10T23:59:59Z"
              },
              {
                title: "P2-Batch-01 Freeze",
                description: "Freeze visual-z1p2-batch1-r1",
                due_on: "2026-05-12T23:59:59Z"
              },
              {
                title: "P2-Batch-02 Expansion",
                description: "Next expansion batch for visual development",
                due_on: "2026-05-26T23:59:59Z"
              },
              {
                title: "P2-Final Freeze",
                description: "Final Phase 2 freeze milestone",
                due_on: "2026-06-15T23:59:59Z"
              }
            ];

            const existing = await github.paginate(github.rest.issues.listMilestones, {
              owner,
              repo,
              state: "all",
              per_page: 100
            });

            const existingTitles = new Set(existing.map(m => m.title));

            for (const ms of milestones) {
              if (!existingTitles.has(ms.title)) {
                await github.rest.issues.createMilestone({
                  owner,
                  repo,
                  title: ms.title,
                  description: ms.description,
                  due_on: ms.due_on
                });
                core.info(`Created milestone: ${ms.title}`);
              } else {
                core.info(`Milestone already exists: ${ms.title}`);
              }
            }
