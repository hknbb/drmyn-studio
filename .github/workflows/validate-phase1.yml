name: Validate Zone 1 Phase 1

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "source/**"
      - "planning/**"
      - "prompts/**"
      - "schemas/**"
      - "evidence/**"
      - "scripts/**"
      - "docs/**"
      - "model_guidance_snapshots/**"
      - "tests/**"
      - ".yamllint"
      - ".github/workflows/validate-phase1.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-phase1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-phase1:
    name: Validate Phase 1 planning records
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema PyYAML yamllint pandas pytest

      - name: Lint YAML (advisory)
        run: |
          yamllint source planning prompts .github || true

      - name: Lint YAML (blocking — SC0014 manifests + continuity ledger)
        run: |
          yamllint -c .yamllint \
            planning/scenes/SC0014/manifests \
            planning/scenes/SC0014/scene_continuity_ledger.yaml

      - name: Ensure expected directories exist
        run: |
          test -d source
          test -d planning
          test -d prompts
          test -d schemas
          mkdir -p evidence/validation_reports

      - name: Run Phase 1 validator
        run: |
          python scripts/validate_phase1.py \
            --source-dir source \
            --planning-dir planning \
            --prompts-dir prompts \
            --schemas-dir schemas \
            --evidence-dir evidence \
            --report-json evidence/validation_reports/phase1_validation_report.json \
            --report-md evidence/validation_reports/phase1_validation_report.md

      - name: Referential integrity check
        run: |
          python scripts/check_referential_integrity.py \
            --planning-dir planning \
            --prompts-dir prompts \
            --output evidence/validation_reports/referential_integrity_report.json

      - name: Rebuild manifests
        run: |
          python scripts/build_manifests.py \
            --planning-dir planning \
            --output-dir planning/manifests

      - name: Check for dirty manifest diff
        run: |
          git diff --exit-code planning/manifests || (
            echo "Manifest files are outdated. Please regenerate and commit them."
            exit 1
          )

      - name: Validate prompt records (Batch 1)
        run: |
          python scripts/validate_prompt_records.py \
            --repo-root . \
            --report-json evidence/validation_reports/prompt_records_validation_report.json

      - name: Validate production records (Batch 5.6)
        run: |
          python scripts/validate_production_records.py \
            --repo-root . \
            --report-json evidence/validation_reports/production_records_validation_report.json

      - name: Run targeted tests (Kling Omni renderer + state chain + Anchor & Animate)
        run: |
          python -m pytest -q \
            tests/test_state_chain.py \
            tests/agents/test_prompt_golden_format.py \
            tests/agents/test_kling_omni_clip_manifest_generation.py \
            tests/agents/test_kling_omni_anchored_i2v.py \
            tests/test_omni_clip_planner.py \
            tests/test_continuity_presence.py \
            tests/test_dialogue_coverage.py \
            tests/test_shot_still_coverage.py

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: phase1-validation-${{ github.run_number }}
          path: |
            evidence/validation_reports/
            planning/manifests/
          retention-days: 14
