name: Phase 2 Label Guard

on:
  issues:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - milestoned
      - demilestoned
      - reopened

permissions:
  contents: read
  issues: write

jobs:
  guard:
    if: startsWith(github.event.issue.title, '[P2]') || contains(join(github.event.issue.labels.*.name, ','), 'phase-2')
    runs-on: ubuntu-latest

    steps:
      - name: Enforce Phase 2 label and basic taxonomy
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.issue.number;
            const labels = context.payload.issue.labels.map(l => l.name);
            const milestone = context.payload.issue.milestone;

            const assetLabels = [
              "asset-character",
              "asset-location",
              "asset-prop",
              "asset-wardrobe",
              "asset-still",
              "asset-motion-pair",
              "asset-evidence"
            ];

            async function ensureLabel(name) {
              if (!labels.includes(name)) {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number,
                  labels: [name]
                });
                core.info(`Added label: ${name}`);
              }
            }

            async function removeLabel(name) {
              if (labels.includes(name)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number,
                    name
                  });
                  core.info(`Removed label: ${name}`);
                } catch (error) {
                  core.warning(`Could not remove label ${name}: ${error.message}`);
                }
              }
            }

            await ensureLabel("phase-2");
            await ensureLabel("review-needed");

            const hasAssetLabel = assetLabels.some(l => labels.includes(l));

            if (!hasAssetLabel) {
              await ensureLabel("blocked");

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: [
                  "This Phase 2 issue is missing an asset label.",
                  "",
                  "Please add one of the following labels:",
                  "- `asset-character`",
                  "- `asset-location`",
                  "- `asset-prop`",
                  "- `asset-wardrobe`",
                  "- `asset-still`",
                  "- `asset-motion-pair`",
                  "- `asset-evidence`"
                ].join("\n")
              });
            } else {
              await removeLabel("blocked");
            }

            if (!milestone) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: [
                  "This Phase 2 issue does not have a milestone.",
                  "",
                  "Please assign one of the standard milestones, for example:",
                  "- `P2-Batch-01 Reference Packs`",
                  "- `P2-Batch-01 Scene Stills`",
                  "- `P2-Batch-01 Motion Prep`",
                  "- `P2-Batch-01 Freeze`"
                ].join("\n")
              });
            }
