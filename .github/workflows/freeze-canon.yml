name: Freeze Canon

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Canonical freeze tag, e.g. canon-z1p1-r1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  freeze-canon:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML pandas jsonschema

      - name: Freeze canon
        run: |
          python scripts/freeze_canon.py \
            --source-dir source \
            --planning-dir planning \
            --prompts-dir prompts \
            --schemas-dir schemas \
            --evidence-dir evidence \
            --tag "${{ github.event.inputs.release_tag }}"

      - name: Upload freeze bundle
        uses: actions/upload-artifact@v4
        with:
          name: canon-freeze-${{ github.event.inputs.release_tag }}
          path: |
            evidence/provenance/
            evidence/validation_reports/
            planning/manifests/
          retention-days: 30
