prompt_text: "SCENE SPECIFICATION: Vale Residence, early morning. Kitchen passage to east-wing corridor. Nadia Vale (early-to-mid 30s, lean, upright silhouette, military-precise movement) moves through pale stone corridor with surveillance-mapping body geometry. Birta (70s, compact, work-shaped silhouette, practical domestic wardrobe) moves with familiar domestic ease through the same space. The corridor is elite domestic: muted tones, expensive underuse, curated order. Filtered daylight from high windows creates controlled geometric shadows on pale stone walls. CRITICAL VISUAL ELEMENT: A framed landscape photograph of Vardova skyline at dusk hangs noticeably tilted—several degrees off-angle—on the corridor wall. Behind the frame, a rectangular dust-shadow is visible on the pale stone wall, proof the frame has been displaced from its original position. The interior photograph shows a skyline at dusk with cool-to-warm gradient (deep blue to amber and rose at horizon). This tilted frame is the primary narrative cue: something has been disturbed in this carefully controlled space.\n\nNADIA'S MOVEMENT SPECIFICATION: Lean upright silhouette. Movement is minimal and exact. She maps the corridor like she has routed exits. Her left wrist scar is visible. She performs a pulse-check habit: glances toward the frame, confirms its position relative to the dust-shadow evidence. She reads object displacement and spatial geometry before reading faces or expressions. Her surveillance register is physical and small: angle, dust-shadow, object placement.\n\nBIRTA'S MOVEMENT SPECIFICATION: Familiar, unhurried domestic ease. She knows this space intimately. Her compact work-shaped silhouette moves like she owns the morning routine. Familiarity with Nadia is present but not expositional—reads lived-in, established, comfortable.\n\nVISUAL REGISTER SPECIFICATION: Wealth reads as expensive underuse, not warmth. Surveillance geometry is small and physical: the angle of the frame, the dust-shadow behind it, object replacement. Doors and thresholds are spatial anchors. Corridor order and curated aesthetic dominate over any warmth or comfort. Light is cool and controlled, filtered. No warm practicals. Muted palette throughout.\n\nCONTINUITY WATCHPOINTS: (1) Nadia's left wrist scar must be visible. (2) Pulse-check habit must be explicit—she confirms the frame's position relative to the dust-shadow. (3) Birta's familiarity with Nadia and the domestic routine must feel lived-in and established, not new or expositional. (4) The frame tilt and dust-shadow must read as movement evidence, not accident. (5) Jin is asleep in the distant room at end of corridor; his presence is established but not foregrounded.\n\nNARRATIVE FUNCTION: Establish Nadia Vale's controlled domestic baseline. Make the Vale residence feel curated and monitored rather than safe. Plant the first concrete intrusion cue through the tilted corridor frame and its dust-shadow evidence. The scene tone: static tension, surveillance discovery, established control with small physical evidence of disturbance."
