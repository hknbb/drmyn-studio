prompt_text: "An elite residence corridor at early morning. Pale stone walls catch filtered daylight from high windows overhead. Along the passage hang a sequence of framed photographs—and this one, the third in the row, sits noticeably tilted. The frame hangs several degrees off-angle, a clear sign of disturbance. The frame itself is simple and domestic, deliberately non-ornate. Critically, behind the frame a larger rectangular dust-shadow is visible on the wall—proof that the frame was moved from its original hanging position. Inside the tilted frame, a landscape photograph of Vardova city skyline at dusk. The skyline silhouette is set against a twilight sky transitioning from cool deep blue to warm amber and rose at the horizon. The city reads as elite and residential, distinctive without caricature. The composition emphasizes the geometry of the misaligned frame, the evidence of the dust-shadow, and the orderly corridor context around it. The light is cool and restrained, befitting early morning in a carefully managed residence. No people visible. The frame's tilt and the dust-shadow behind it must both be legible and immediate—visible at the residential viewing distance from which someone would pass the photograph in the corridor."
