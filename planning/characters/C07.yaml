story_function: "Film's external intelligence vector and conduit between Nadia's internal fight and the world outside the game. Receives what Nadia cannot broadcast through Roman's system and publishes through channels Roman cannot suppress. Ally with her own institutional constraints — a senior editor (Morvan, C44) applies pressure to kill the story — her arc tracks whether those constraints will cost Nadia the window she needs."
arc_baseline:
  wound: "A previous source was burned after Sera's story was pulled at institutional pressure. She blamed herself for not moving faster, not protecting the source better. Wound produces over-correction: she now verifies past the point of comfort before publishing, which can cost the people who need her to move fast."
  mask: "Hard-nosed professional skepticism as armor. Performs distrust as a virtue when it is actually protection against the guilt of failing another source."
  want: "The story and the institutional vindication that comes with it."
  need: "Act as a protector rather than a recorder — understand that her relationship to the source is not just editorial but human."
  initial_arc_phase: MASK
