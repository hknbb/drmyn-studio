stress_tell: "Hands become very still while eyes move rapidly — the inverse of typical stress pattern; a sign of the training that made her useful to Roman's network."
concealment_tell: "Suddenly task-oriented — picks up a practical problem and solves it with unnecessary precision; organizes, arranges, checks equipment. The busyness is the tell."
vulnerability_tell: "Quieter, not louder. Sentences fragment — starts constructions and leaves them open in a way that does not invite completion. Waiting to be understood without having to finish."
