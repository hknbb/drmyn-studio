role_label: "Primary ally (conditional; transactional before genuine)"
story_function: "Secondary arc and parallel transformation to Nadia; the operational ally who provides resources and reach Nadia's own network cannot. Her alignment is explicit and transactional before becoming genuine through mutual recognition and shared cost."
arc_baseline:
  wound: "Roman's network holds her daughter Lena through a debt-trap — a fabricated legal liability she can work against indefinitely without ever reducing. She entered the hunter pool because the bounties offered the only income stream that could theoretically reach the debt's floor; she has been telling herself this is pragmatic strategy rather than capitulation."
  mask: "Mercenary hardness — the pragmatist who takes this work because it is work. Functional enough in the hunter pool; does not fool Nadia for long and does not fool herself."
  want: "Lena's freedom from Roman's leverage."
  need: "Act from her own moral judgment rather than the logic of debt and coercion — stop treating the debt as the frame and start treating her own agency as the frame."
  initial_arc_phase: MASK
want: "Secure Lena's freedom from Roman's leverage."
need: "Stop letting the debt define the frame; act from agency instead of coercion logic."
wound: "Years of surviving inside Roman's system by performing the exact moral compromise it requires."
mask: "Mercenary hardness; the work-is-work pragmatist register that suppresses both maternal protectiveness and moral intelligence."
voice_fingerprint:
  lexicon:
    - "direct operational economy-of-motion"
    - "no metaphor"
    - "no hedging in professional register"
    - "warmer rhythms and compressed idioms with West African-English inflection when the mask slips"
  rhythm: "Clipped, front-loaded. Minimum scaffolding. States conclusions before evidence; expects others to keep up. Long pauses before answers she has not decided to give; when she has decided, the sentence arrives whole."
  default_tactic: "Parallel transaction — states her terms before acting and expects the same clarity in return. Protection and respect at once."
  status_signals:
    - "Physical economy — never moves more than the situation requires."
    - "Occupies specific points in a room rather than filling it; in tight spaces reads as absolute confidence, in large spaces as contained power."
  verbal_tic: "When she has made a decision she does not like, she exhales once audibly through her nose — a small controlled pressure release, not quite a sigh."
voice_register: "Direct operational professional register in the field; warmer West African-English rhythm only when the mask slips."
