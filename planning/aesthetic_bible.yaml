  - pack_id: ORACLE_BROADCAST_CLEAN
    name: "Oracle Prime Broadcast — Calibrated False Clean"
    visual_thesis: >
      The broadcast layer of the system: high-contrast, typographic,
      calibrated, professionally persuasive, emotionally false. Image reads
      cleaner and more finished than lived-space imagery, but never as
      celebration — it is the look of a profit machine, not a game show.
      Highlights are controlled; the frame admits financial instrumentation
      first, entertainment second. Camera may briefly adopt system-facing
      observation, but human physicality must remain on screen.
    derived_from:
      style_bible_sections:
        - "Core cinematic register"
        - "Exposure / contrast rules"
        - "Broadcast-world vs lived-world visual distinction rules"
        - "Negative visual rules"
        - "Do-not-drift list"
    search_keywords:
      - "broadcast world calibrated false clean cinematography"
      - "high-contrast typographic interface composition"
      - "controlled highlight, no bloom"
      - "financial instrumentation aesthetic"
      - "system-facing observation register"
      - "professionally persuasive broadcast layer"
      - "interface white against controlled dark field"
      - "calibrated subscriber-feed look"
      - "polished clean broadcast interior"
      - "emotionally false high-finish image"
    element_keyword_map:
      t2i_character_element:
