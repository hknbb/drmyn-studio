description: >
  The Herald's HALO UNIT physical chassis specification. Compact conical body
  in smooth matte cream/light-grey/warm-white. 360-degree disc/drum sensor array
  at head height with small apex dome. Low-profile wheeled base, minimal
  footprint. No arms, no manipulators, no humanoid features. Professional
  near-future broadcast equipment aesthetic — the visual register of a sophisticated
  AV unit, not science-fiction hardware. Slightly unnerving precisely because it
  is pleasant. Locked at Stage-2 (a2b3f540_0 oref lock).
