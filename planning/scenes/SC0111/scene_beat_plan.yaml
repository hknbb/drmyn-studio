    camera: { angle: eye_level, framing: medium, movement: static, lens_bias: "her face; the shift; then her body moving toward the door" }
    lighting: { source: low_key, quality: hard, color_temp: cool, intensity: dim }
    motion: { subject_intensity: 0.4, camera_intensity: 0.0, blocking_notes: "The moment the priority becomes clear; movement toward the exit." }
    notes: "Final line: 'Jin is in the building.' Nadia's focus is no longer on Roman. She moves."

