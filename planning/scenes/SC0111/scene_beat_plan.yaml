        kling_alias: "@C01_NADIA"
        role: "Rising from one knee; left-side pain categorical; counting down three; standing."
    camera: { angle: eye_level, framing: medium_close, movement: handheld, lens_bias: "her effort; the pain; one knee to standing" }
    lighting: { source: low_key, quality: hard, color_temp: cool, intensity: dim }
    motion: { subject_intensity: 0.6, camera_intensity: 0.2, blocking_notes: "Nadia's difficulty getting up; pain visible; deliberate three-count; rise to standing." }
    notes: "Her body is taxed. The rise is deliberate, not easy. She is still fighting the injury."

  - beat_id: ROMAN_ON_FLOOR_UNRESOLVED
    content: >
      Roman is on the corridor floor. Breathing — she can see the chest moving from
      here, the way she has been trained to see it from a distance in low light without
      equipment. He is not confirmed as to what comes next. The film does not resolve
      this here.
    semantic_duration_hint: long_hold
    may_merge_with_next: false
    splittable: true
    narrative_role: hold
    required_element_ids: [C01, C02]
    figures:
