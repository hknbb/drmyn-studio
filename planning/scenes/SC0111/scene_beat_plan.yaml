        role: "Standing; assessing Roman; breathing; not staying to confirm."
      - figure_id: FIG_ROMAN
        base_element_id: C02
        kling_alias: "@C02_ROMAN"
        role: "On the floor; breathing; unresolved; unconfirmed."
    camera: { angle: eye_level, framing: medium_wide, movement: static, lens_bias: "both of them in the space; her standing, him on the floor; distance between" }
    lighting: { source: low_key, quality: hard, color_temp: cool, intensity: dim }
    motion: { subject_intensity: 0.1, camera_intensity: 0.0, blocking_notes: "Minimal movement; Nadia's breath; Roman's chest rising; the unresolved question." }
    notes: "She is not staying to finish or confirm. The narrative does not resolve his state. She moves on because—"

  - beat_id: JIN_IN_BUILDING
    content: >
      She is not standing here long enough for resolution. Jin is in the building.
      She is standing. She moves.
    semantic_duration_hint: short_insert
