        base_element_id: C01
        kling_alias: "@C01_NADIA"
        role: "Maintaining the hold; at six seconds."
      - figure_id: FIG_ROMAN
        base_element_id: C02
        kling_alias: "@C02_ROMAN"
        role: "Moment where body response becomes visible and undeniable."
    camera: { angle: eye_level, framing: close, movement: static, lens_bias: "his face; body response beginning; shift in status" }
    lighting: { source: low_key, quality: hard, color_temp: cool, intensity: dim }
    motion: { subject_intensity: 0.5, camera_intensity: 0.0 }
    notes: "Turn of the hold. The autonomic response is now dominant."

  - beat_id: SEVEN_SECONDS_COLLAPSE
    content: >
      Seven.
      He goes down the way vasovagal response takes a person — not a fall, not a
      collapse, a controlled exit of the legs from load-bearing status. She goes with
      him, one knee on the corridor floor, because she does not have the margin to
      release cleanly and step back. She releases.
    semantic_duration_hint: normal
    may_merge_with_next: false
    splittable: false
    narrative_role: action
    required_element_ids: [C01, C02]
    figures:
      - figure_id: FIG_NADIA
        base_element_id: C01
        kling_alias: "@C01_NADIA"
        role: "Seven seconds; releasing as Roman collapses; going to one knee; exhausted but on guard."
      - figure_id: FIG_ROMAN
        base_element_id: C02
        kling_alias: "@C02_ROMAN"
        role: "Vasovagal response; controlled descent; legs losing load-bearing; down."
    camera: { angle: eye_level, framing: medium, movement: handheld, lens_bias: "both of them going down; Nadia with him; the corridor floor" }
    lighting: { source: low_key, quality: hard, color_temp: cool, intensity: dim }
    motion: { subject_intensity: 0.7, camera_intensity: 0.3, blocking_notes: "Coordinated descent; Nadia controlled with him; floor contact; release as he goes down." }
    notes: "Vasovagal collapse is not dramatic — it is controlled and physical. Both of them on the floor; she releases."

  - beat_id: RISE_COUNT_OF_THREE
    content: >
      She tries to stand. Her left side is settled into a specific, narrow, consuming
      pain — not acute anymore, categorical. She gets to one knee. She gives herself
      the count of three. At three she stands.
    semantic_duration_hint: normal
    may_merge_with_next: false
    splittable: false
    narrative_role: action
    required_element_ids: [C01]
    figures:
