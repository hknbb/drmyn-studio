scene_id: SC0111
notes: >
  "VELTAIN COMPOUND — ANTECHAMBER CORRIDOR" (source lines 8993-9049). Beats derived
  only from scene_excerpt.md; no story facts added. Silent action (Format A). Two
  characters: C01 Nadia Vale (@C01_NADIA), C02 Roman Vale (@C02_ROMAN). The scene
  traces Nadia's adjustments to her left-side injury, Roman's spatial advantage via
  floor-seam knowledge, the tightening geometry, Nadia's shift from retreat to
  approach, bilateral carotid-sinus hold application, vasovagal response, her
  recovery and stand, Roman on the floor unresolved, and her movement on the final
  line "Jin is in the building." Pacing: contained, precise, exhaustion-marked.
  Lighting: low-key, cool, institutional. Camera: tight, handheld only where contact
  demands; framing reads leverage and geometry closing.
source_beats:
  - beat_id: ESTABLISH_ADJUSTMENT
    content: >
      Nadia is adjusted to her left-side deficit from the sternum injury. Roman watches
      how she has adjusted to it — her left arm leverage compromised, her movement
      compensating. He is reading her in real time.
    semantic_duration_hint: long_hold
    may_merge_with_next: false
    splittable: true
    narrative_role: establish
    required_element_ids: [C01, C02]
