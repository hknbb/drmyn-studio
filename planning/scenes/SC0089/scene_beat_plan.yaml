notes: >
  "Northern Transit Corridor — Outer District Perimeter" (source lines 7221-7413).
  Beats derived only from scene_excerpt.md; no story facts added. Nadia (C01, @C01_NADIA)
  and Zara (C06, @C06_ZARA) move at 8m intervals along the west wall of a 200m-spaced
  overhead-light corridor. Nadia conducts a real-time tactical read: comms-ping spacing
  reveals two hunter teams; her broadcast decoy still feeds ORACLE PRIME; seam vibration
  on the embankment repair indicates advance element on the far side. She calls an
  over-the-top breach into the drainage cut. Off-screen: Dimitri's command-channel
  pings and voice, hunter teams approaching from south and north. Pacing: controlled,
  measured movement punctuated by static holds (reads). The light pools and darkness
  drive visual rhythm. After Zara is shot, the scene compresses into an urgent exit
  through the drainage conduit, cut off by convergent comms activity.
