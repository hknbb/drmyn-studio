  - beat_id: FRAME_STRAIGHTENING
    content: 'Her fingertips touch the frame. She straightens it.'
    semantic_duration_hint: normal
    narrative_role: action
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - PROP003
    notes: "Precise corrective action. 'Her' = Nadia (C01). Frame = PROP003. Mirrors water glass placement."

  - beat_id: DUST_SHADOW_EVIDENCE
    content: 'The wall-mount''s dust-shadow is slightly larger than the frame now sitting over it. Someone moved this. Recently. And replaced it not quite right. Her fingers stay on the frame for one beat longer than the task requires. Then she lets go and walks on.'
    semantic_duration_hint: normal
    narrative_role: hold
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - PROP003
    notes: "Evidence of intrusion. 'Her fingers' = Nadia (C01). Frame = PROP003 (dust-shadow is objective proof). Extended contact shows emotional resonance."

  - beat_id: WRIST_PULSE_CHECK
    content: 'Her pace doesn''t change. Her posture is impeccable. She touches her fingertips briefly to the inside of her own wrist as she rounds the corner — pulse-check, two seconds, automatic — and continues toward Jin''s room.'
    semantic_duration_hint: short_insert
    narrative_role: pulse_check
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
    notes: "Two-second physiological check. 'She' = Nadia (C01). Automatic, not deliberate. Trained self-monitoring."

  - beat_id: MOVEMENT_TO_JINS_ROOM
    content: 'She rounds the corner and continues toward Jin''s room.'
    semantic_duration_hint: short_insert
    narrative_role: transition
    may_merge_with_next: true
    splittable: false
    required_element_ids:
