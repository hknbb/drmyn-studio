  - beat_id: NADIA_JIN_OBSERVATION
    content: 'Nadia stands in the doorway. Doesn''t enter. JIN sleeps in his crib, eight months, face turned sideways, one hand open. She watches him the way she watched the cabinet. Taking inventory of what is present. What is safe. What is still where it should be. She stays there thirty seconds.'
    semantic_duration_hint: long_hold
    narrative_role: hold
    may_merge_with_next: true
    splittable: true
    required_element_ids:
      - C01
    notes: "Extended observation. Nadia (C01) in doorway. Jin has no bound element ID yet. Parallel inventory behavior. Splittable if scene editing requires Jin-watching distribution."

  - beat_id: DOOR_CLOSING_EXIT
    content: 'Then she pulls the door almost closed and goes to get dressed.'
    semantic_duration_hint: short_insert
    narrative_role: action
    may_merge_with_next: false
    splittable: false
    required_element_ids:
