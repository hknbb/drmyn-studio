    notes: "Navigation toward destination. 'She' = Nadia (C01). Brief transitional moment."

  - beat_id: JINS_ROOM_ESTABLISH
    content: 'INT. VALE RESIDENCE — JIN''S ROOM — CONTINUOUS. The room is warm and dim. A white-noise machine hums.'
    semantic_duration_hint: normal
    narrative_role: establish
    may_merge_with_next: true
    splittable: false
