source_beats:
  - beat_id: ESTABLISH_KITCHEN
    content: 'INT. VALE RESIDENCE — KITCHEN PASSAGE. The kitchen is expensive and underused. Pale stone surfaces. A single unwashed cup beside the sink — Nadia''s.'
    semantic_duration_hint: normal
    narrative_role: establish
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - LOC001
    notes: Sets visual/thematic anchor for entire scene. Establishes wealth, lack of use, Nadia''s precise domesticity.

  - beat_id: NADIA_PASSAGE_MOVEMENT
    content: 'NADIA moves through the passage with the economy of someone who has mapped every room for exits. Not rushed. Not nervous. Just precise.'
    semantic_duration_hint: normal
    narrative_role: action
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - LOC001
    notes: Establishes Nadia''s spatial awareness and controlled precision. Movement quality is character definition.

  - beat_id: WATER_GLASS_ACTION
    content: 'She fills a glass of water, drinks half, sets it exactly where she found it.'
    semantic_duration_hint: normal
    narrative_role: action
    may_merge_with_next: false
    splittable: false
    required_element_ids:
      - C01
      - LOC001
    notes: "Precise action sequence. 'She' = Nadia (C01). Exactness of placement is psychologically significant. Sets up frame-straightening parallel later."

  - beat_id: WRIST_SCAR_INSERT
    content: 'Her left wrist turns as she sets the glass down. A thin pale scar crosses the underside — surgical-clean, old, not decorative. She doesn''t look at it.'
    semantic_duration_hint: short_insert
    narrative_role: insert
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
    notes: "Brief reveal of physical history. 'Her' = Nadia (C01). Surgical precision of scar mirrors her behavioral precision. She doesn''t examine it."

  - beat_id: CABINET_INVENTORY
    content: 'She opens a cabinet. Inventories its contents the way a person inventories a kit.'
    semantic_duration_hint: normal
    narrative_role: action
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - LOC001
    notes: "Actions as character study. 'She' = Nadia (C01). Inventory-like behavior is methodical and distanced."

  - beat_id: CORRIDOR_TRANSITION
    content: 'INT. VALE RESIDENCE — EAST-WING CORRIDOR — CONTINUOUS. The corridor is wide. Corporate art on the walls — purchased, not chosen. Nadia walks it like a route she has timed.'
    semantic_duration_hint: normal
    narrative_role: transition
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
    notes: Environmental transition. Corporate art (purchased, not chosen) reflects family/home emotional distance.

  - beat_id: BIRTA_ENTRANCE
    content: 'BIRTA, seventies, compact, moves toward her from the far end — a tray of folded linens balanced with the authority of a woman who has carried things her whole life.'
    semantic_duration_hint: normal
    narrative_role: establish
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C03
    notes: Introduces Birta (C03) with physical authority and life history compressed into single description.

  - beat_id: DIALOGUE_SLEEP_ACCUSATION
    content: 'BIRTA: "You didn''t sleep again." NADIA: "I slept." BIRTA: "You slept the way you fold laundry. Very neat. Not restful." Nadia almost smiles. Not quite.'
    semantic_duration_hint: normal
    narrative_role: dialogue
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - C03
    notes: 'Three-line exchange establishing Birta''s caregiving awareness and intimacy. Laundry metaphor mirrors Nadia''s precision. Nadia''s near-smile is rare affect.'

  - beat_id: DIALOGUE_FORMULA_VITAMIN
    content: 'NADIA: "Jin''s formula. There''s a new tin in the second shelf, behind the vitamin drops." BIRTA: "I found it. He''s still down. Your husband —" [She stops herself. Adjusts the linens.]'
    semantic_duration_hint: normal
    narrative_role: dialogue
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - C03
    notes: 'Nadia delegates child care. Birta starts to use familiar term "Your husband" then catches herself, returning to formal "Mr. Vale." Reveals relationship dynamic.'

  - beat_id: DIALOGUE_MR_VALE_CALL
    content: 'BIRTA (CONT''D): "Mr. Vale called from the car. He said not to wait on breakfast."'
    semantic_duration_hint: normal
    narrative_role: dialogue
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - C03
    notes: 'Factual report of Mr. Vale''s call. Absence setup. Establishes morning schedule pattern.'

  - beat_id: NADIA_PRIOR_KNOWLEDGE
    content: 'NADIA: "He won''t be back before eight." [She says it without looking at Birta. She already knew.]'
    semantic_duration_hint: normal
    narrative_role: dialogue
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - C03
    notes: 'Nadia already knew Mr. Vale''s schedule. Not surprised. Not looking at Birta. Information control and emotional containment.'

  - beat_id: BIRTA_COVERED_LINENS
    content: 'BIRTA: "I''ll leave something covered." Nadia nods.'
    semantic_duration_hint: short_insert
    narrative_role: dialogue
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - C03
    notes: Brief exchange closing breakfast topic. Nadia''s nod is minimal affirmation.

  - beat_id: NADIA_BIRTA_PASSING
    content: 'They pass each other. Birta continues down the corridor. Nadia stops at the third framed photograph — a landscape, VARDOVA skyline at dusk.'
    semantic_duration_hint: normal
    narrative_role: action
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - C03
      - PROP003
    notes: Physical passing and separation. Nadia (C01) and Birta (C03) are both visible. Nadia pivots attention to frame (PROP003). Vardova landscape becomes psychological anchor point.

  - beat_id: OFF_ANGLE_DISCOVERY
    content: 'She notices the angle. Off. By three or four degrees. She would not have been able to say why she knew the angle, but she knows.'
    semantic_duration_hint: short_insert
    narrative_role: pulse_check
    may_merge_with_next: true
    splittable: false
    required_element_ids:
      - C01
      - PROP003
