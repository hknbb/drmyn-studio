scene_id: SC0047
notes: >
  "MERIN — QUAY DISTRICT, UNIT 14-B" (source lines 3768-3861). Beats derived only from
  scene_excerpt.md; no story facts added. The handset handoff is the structural pivot:
  Otto gives Nadia the unmarked industrial handset from a locked case; she enters the
  code (7-3-1-1-4); Marcus's recorded message (V.O.-only; he is deceased) delivers the
  dossier on Roman via an encrypted partition. The scene is a two-hander of operational
  precision and intimate loss — Otto's withdrawal to the window gives her privacy; Nadia's
  read of the partition documentation is framed as time shifting (light quality changes,
  quay beginning to move) while she absorbs the intelligence that will drive her assault.
  Pacing: slow, still, weighted; no urgency, only the cold matter-of-factness of inheritance
  and the weight of what comes next.
source_beats:
  - beat_id: ESTABLISH_FREIGHT_BAY
    content: >
      The converted freight bay: low concrete ceiling, one high window facing the quay,
      light that smells like salt and diesel. Crates against the west wall. A folding table.
      A camp stove that has not been used today. The room as the operational shelter and
      the site of the inheritance to come.
    semantic_duration_hint: long_hold
    may_merge_with_next: false
    splittable: true
    narrative_role: establish
    required_element_ids: [LOC001]
    camera: { angle: eye_level, framing: wide, movement: static, lens_bias: "wide establishing of the bay and the window; the grey water visible" }
    lighting: { source: filtered_daylight, quality: soft, color_temp: cool, intensity: moderate }
    motion: { subject_intensity: 0.0, camera_intensity: 0.1, blocking_notes: "Hold on the room; establish the high window and the quay light as the breathing space." }
    notes: "Establish the operational aesthetic — converted freight bay, minimal comfort, the grey water as context. The space is cold but human."

  - beat_id: OTTO_WAITING
    content: >
      Otto is already there when Nadia arrives. He is sixty, or seventy, or the particular
      age that people who have spent their lives in operational work look when you meet them
      for the first time — which is: all of it, at once. He does not offer his hand.
    semantic_duration_hint: normal
    may_merge_with_next: false
    splittable: false
    narrative_role: establish
    required_element_ids: [C09]
    figures:
