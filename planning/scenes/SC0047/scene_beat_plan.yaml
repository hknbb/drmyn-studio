        base_element_id: C09
        kling_alias: "@C09_OTTO"
        role: "Operational contact, aged by the work, waiting to give what he has been holding."
        distinguishing_detail: "Does not offer his hand; stands ready but does not greet."
    camera: { angle: eye_level, framing: medium, movement: static, lens_bias: "Otto in the room; the refusal of the handshake is the opening gesture" }
    lighting: { source: filtered_daylight, quality: soft, color_temp: cool, intensity: moderate }
    motion: { subject_intensity: 0.1, camera_intensity: 0.0 }
    notes: "Otto's operational stance and refusal of formality establish the transaction's gravity. He has been holding this and is ready to give it."

