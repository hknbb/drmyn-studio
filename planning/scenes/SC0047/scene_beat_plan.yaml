    motion: { subject_intensity: 0.1, camera_intensity: 0.0 }
    notes: "Otto's words confirm Marcus's planning. She does know the code. The familiarity is the third layer of intimacy — Marcus trusted her with the access."

  - beat_id: OTTO_MOVES_TO_WINDOW
    content: >
      Otto moves to the far end of the room. He turns his back. He looks out the high window
      at the grey water. This is the only thing he has left to give her, and he gives it
      without being asked — his withdrawal is the gift of privacy.
    semantic_duration_hint: normal
