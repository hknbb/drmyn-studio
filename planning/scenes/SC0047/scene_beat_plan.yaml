        distinguishing_detail: "Profile to the window; the grey water behind him; the single gesture of operational kindness."
    camera: { angle: eye_level, framing: medium_wide, movement: tracking, lens_bias: "Otto's movement to the window; the high window and grey water framed behind him" }
    lighting: { source: filtered_daylight, quality: soft, color_temp: cool, intensity: moderate }
    motion: { subject_intensity: 0.4, camera_intensity: 0.2, blocking_notes: "Otto walks to the far end; turns to face the window; settles into profile against the high window and quay." }
    notes: "Otto's withdrawal is the emotional turn of the scene — the only gift left is solitude and privacy. His back to her is dignity and discretion."

  - beat_id: NADIA_ENTERS_CODE
    content: >
      Nadia enters the access code: 7-3-1-1-4. The phone activates. A single audio file.
      No label. She presses play. The code entry and the moment of activation.
    semantic_duration_hint: normal
    may_merge_with_next: false
    splittable: false
    narrative_role: action
