    motion: { subject_intensity: 0.3, camera_intensity: 0.0, blocking_notes: "Deliberate, practiced movement; the case is unlocked beneath the table; the handset is placed on the table between them." }
    notes: "The handset (PROP047) is introduced as a deferred load-bearing prop. Industrial-grade, unmarked. This is what Marcus left."

