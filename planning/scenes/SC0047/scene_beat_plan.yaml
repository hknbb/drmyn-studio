        role: "States the logistics; offers the fact about Marcus as operational record, not comfort."
      - figure_id: FIG_NADIA
        base_element_id: C01
        kling_alias: "@C01_NADIA"
        role: "Claims the time she needs; accepts Otto's statement about Marcus; returns to work."
    camera: { angle: eye_level, framing: medium, movement: static, lens_bias: "both figures; the agreement; the quiet professionalism of the exchange" }
    lighting: { source: filtered_daylight, quality: soft, color_temp: cool, intensity: moderate }
    motion: { subject_intensity: 0.1, camera_intensity: 0.0 }
    notes: "Otto's final lines are operational and factual. 'He was a careful man' is not comfort — it is Marco's legacy as an operational record. Nadia's 'Yes' accepts this and returns to the work. The handoff is complete; the assault can begin."

