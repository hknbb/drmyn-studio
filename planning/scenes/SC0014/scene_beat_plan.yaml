        role: "Eight-month-old held safely against Nadia; calm, supported."
        distinguishing_detail: "Infant; pale blue name bracelet on wrist."
    camera: { angle: eye_level, framing: medium_close, movement: static, lens_bias: "intimate, close to mother and child" }
    lighting: { source: practical, quality: soft, color_temp: warm, intensity: dim }
    motion: { subject_intensity: 0.1, camera_intensity: 0.05, blocking_notes: "Infant fully supported in arms; safe handling throughout." }
    notes: "PROTECTED SUBJECT — safe, supported infant handling; the dread is in Nadia, not in the child."

