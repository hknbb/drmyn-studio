notes: >
  "Jin's Nursery — The Taking" (source lines 1071-1134). Beats derived only from
  scene_excerpt.md; no story facts added. PROTECTED SUBJECT: Jin (C08) is an infant.
  All infant handling must read as safe and supported; infant distress stays
  off-frame; the taking is carried by Nadia's POV and adult performance, not by
  exploiting the child. Two anonymous enforcers share base C10 but are two DISTINCT
  figures (anti-clone): @C10_CARRIER lifts/carries Jin (the "first man"),
  @C10_HOLDER restrains Nadia (the "second man"). Pacing: contained, exact,
  unhurried; the room's warmth is never relit when the men arrive. Dialogue is
  Dimitri-only and is treated as metadata; default delivery is Format A
  (suppressed) given the protected subject until voice is provisioned.
