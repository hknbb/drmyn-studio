prop_id: PROP001
name: "Jin's medical bracelet"
narrative_function: "Continuity-critical infant identifier that later becomes a passive tracking anchor; it keeps Jin specific and materially present rather than abstract."
visual_description: >
  Thin hospital-style plastic bracelet with printed ID strip. Source evidence grounds two
  distinct bracelet states: (1) white plastic in SC0003 — the birth/registration bracelet,
  Nadia listed as registrant; (2) pale blue band in SC0010, SC0011, SC0014 — a replacement
  bracelet from a later medical check-up, explicitly described as "from his last check-up"
  in SC0010. These are different physical bracelets, not the same object under different lighting.
category: CLOTHING_ACCESSORY
canonical_name: "Jin's medical bracelet"
aliases:
