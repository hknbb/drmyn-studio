  - "bracelet tracker"
prop_type: "infant continuity identifier"
ownership_or_association: "Jin wears it; Nadia is listed as registrant and later tracks him through it."
physical_description_grounded: >
  SC0003: "The bracelet is white plastic with a small printed ID strip. His name. Her name
  listed as registrant." (source lines 159-206). SC0010: "The hospital bracelet from his
  last check-up — a pale blue band, his name printed on it in small type." (source lines
  690-774). SC0011 and SC0014 confirm the pale blue bracelet as the same object she
  adjusted in SC0010. The "pale blue" wording is consistent and unqualified across all
  three later scenes; the "pale blue/white" phrasing in earlier planning records was
  imprecise and is now superseded.
