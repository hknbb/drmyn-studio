prop_id: PROP008
name: "Marcus's unmarked handset (dossier)"
narrative_function: >
  The dead informant's dead-man's-switch device: an unmarked industrial handset Otto
  holds for Nadia, unlocked by a code (7-3-1-1-4) and a second date-reversed code for
  an encrypted partition that contains Marcus's complete dossier on Roman — network
  structure, financial infrastructure, the broadcast system, the names. It is the
  engine of Nadia's entire plan and is referenced in downstream confrontation scenes.
visual_description: >
  A plain, industrial-grade handset with no manufacturer markings — utilitarian,
  rugged, unremarkable; kept in a small locked case. A single unlabeled audio file on
  activation. Nothing tech-futuristic; ordinary hardened field hardware.
